<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アイコン比較 - さら砂</title>
<link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&family=Yusei+Magic&family=Zen+Maru+Gothic:wght@300;400&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: #F7F2EA; color: #28201A;
    margin: 0; padding: 40px 20px;
  }
  h2 { font-family: 'RocknRoll One', sans-serif; font-size: 16px; letter-spacing: .2em; margin-bottom: 18px; }
  .row {
    display: flex; gap: 30px; flex-wrap: wrap;
    background: #FDFAF5; border: 1px solid #DDD4C8;
    padding: 24px; margin-bottom: 30px;
  }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 80px; }
  .label { font-size: 11px; color: #786858; letter-spacing: .1em; }
  svg { display: block; }
  .icon-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: 1px solid #DDD4C8; cursor: pointer;
    padding: 6px 12px; font-family: 'Yusei Magic', sans-serif;
    font-size: 11px; color: #28201A; letter-spacing: .08em;
    transition: background .2s;
  }
  .icon-btn:hover { background: #F2E8DF; border-color: #B86838; }
  .icon-btn.active { background: #F2E8DF; border-color: #B86838; color: #B86838; }
</style>
</head>
<body>

<h2>A案 — シンプル線画</h2>
<div class="row">
  <div class="item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#28201A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h12v18l-6-4-6 4z"/>
    </svg>
    <span class="label">しおり</span>
  </div>
  <div class="item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#28201A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 4h11l4 4v12H5z"/>
      <path d="M16 4v4h4"/>
    </svg>
    <span class="label">付箋</span>
  </div>
  <div class="item">
    <button class="icon-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12v18l-6-4-6 4z"/></svg>
      しおりを挟む
    </button>
    <span class="label">ボタン例</span>
  </div>
  <div class="item">
    <button class="icon-btn active">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#B86838" stroke="#B86838" stroke-width="1.5" stroke-linejoin="round"><path d="M6 3h12v18l-6-4-6 4z"/></svg>
      しおり済み
    </button>
    <span class="label">挟んだ状態</span>
  </div>
</div>

<h2>B案 — 手書き風ラフ（さら砂寄り）</h2>
<div class="row">
  <div class="item">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#28201A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 3.5c-.4 0-1 .3-1 .9 0 4 .2 11 .2 16.4 0 .6.5.8.9.5l4.7-3.7c.4-.3.9-.3 1.3 0l4.6 3.6c.5.4 1 .1 1-.5 0-5.4 0-12.5.1-16.3 0-.6-.6-.9-1-.9-3.5-.2-7.4-.2-10.8 0z"/>
      <path d="M9.5 6.5c1.5-.3 3.5-.3 5 0" />
    </svg>
    <span class="label">しおり</span>
  </div>
  <div class="item">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#28201A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-6)">
      <path d="M5.2 5c4-.4 8.5-.4 11.7-.2.5 0 .8.4.8.9-.1 3.3-.3 8.2-.5 11.4 0 .4-.4.7-.8.8-3.5.4-7 .4-10.7.1-.5 0-.8-.4-.8-.8.1-3.5.2-8.5.3-11.4 0-.4.3-.7.7-.8z"/>
      <path d="M14 5.2c0 1.5.5 2.7 2.5 2.5"/>
    </svg>
    <span class="label">付箋</span>
  </div>
  <div class="item">
    <button class="icon-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3.5c-.4 0-1 .3-1 .9 0 4 .2 11 .2 16.4 0 .6.5.8.9.5l4.7-3.7c.4-.3.9-.3 1.3 0l4.6 3.6c.5.4 1 .1 1-.5 0-5.4 0-12.5.1-16.3 0-.6-.6-.9-1-.9-3.5-.2-7.4-.2-10.8 0z"/></svg>
      しおりを挟む
    </button>
    <span class="label">ボタン例</span>
  </div>
  <div class="item">
    <button class="icon-btn active">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#B86838" stroke="#B86838" stroke-width="1.4" stroke-linejoin="round"><path d="M7 3.5c-.4 0-1 .3-1 .9 0 4 .2 11 .2 16.4 0 .6.5.8.9.5l4.7-3.7c.4-.3.9-.3 1.3 0l4.6 3.6c.5.4 1 .1 1-.5 0-5.4 0-12.5.1-16.3 0-.6-.6-.9-1-.9-3.5-.2-7.4-.2-10.8 0z"/></svg>
      しおり済み
    </button>
    <span class="label">挟んだ状態</span>
  </div>
</div>

<p style="font-size: 12px; color: #786858; line-height: 2; padding: 0 4px;">
A案＝シャープで現代的、B案＝丸みがあって手描き感あり。<br>
どっちが好みですか？それとも別の方向性？
</p>

</body>
</html>
