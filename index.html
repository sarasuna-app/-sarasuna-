    /* ── ProfileEdit ── */
    function ProfileEdit({ session, profile, onBack, onSaved }) {
      const [handle,  setHandle]  = useState(profile?.handle || session?.user?.user_metadata?.handle || '');
      const [saving,  setSaving]  = useState(false);
      const [error,   setError]   = useState('');
      const [success, setSuccess] = useState(false);

      /* 最後に変更した日時から残り日数を計算 */
      const lastUpdated  = profile?.handle_updated_at ? new Date(profile.handle_updated_at) : null;
      const cooldownDays = 7;
      const now          = new Date();
      const diffMs       = lastUpdated ? now - lastUpdated : Infinity;
      const diffDays     = diffMs / (1000 * 60 * 60 * 24);
      const remainDays   = Math.ceil(cooldownDays - diffDays);
      const isCooling    = remainDays > 0;

      async function handleSave() {
        if (isCooling) return;
        const h = handle.trim();
        if (!h) { setError('ハンドルネームを入力してください'); return; }
        if (h.length > 20) { setError('20文字以内で入力してください'); return; }
        setSaving(true);
        const { error: err } = await sb.from('profiles')
          .update({ handle: h, handle_updated_at: new Date().toISOString() })
          .eq('id', session.user.id);
        setSaving(false);
        if (err) { setError('保存できませんでした'); return; }
        setSuccess(true);
        setTimeout(() => { onSaved(h); onBack(); }, 1200);
      }

      const birthYear = profile?.birth_year;

      return (
        <div className="screen my-screen">
          <div style={{ background:'var(--surface)', borderBottom:'1px solid var(--rule)', padding:'14px 16px', display:'flex', alignItems:'center', gap:'12px' }}>
            <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', fontSize:'16px', color:'var(--ink-3)', padding:'2px 8px 2px 0', fontFamily:"'Shippori Mincho',serif" }}>←</button>
            <span className="screen-title" style={{ fontSize:'16px' }}>プロフィール編集</span>
          </div>
          <div style={{ padding:'24px 16px 48px' }}>

            {/* ─ 生まれた年（変更不可） ─ */}
            {birthYear && (
              <div className="form-field">
                <label className="form-label">生まれた年</label>
                <div style={{
                  padding:'11px 12px', background:'var(--bg)',
                  border:'1px solid var(--rule)',
                  fontSize:'14px', color:'var(--ink-3)',
                  fontFamily:"'Noto Serif JP',serif", letterSpacing:'.04em'
                }}>
                  {birthYear}年
                </div>
                <p className="form-hint">生まれた年は変更できません。</p>
              </div>
            )}

            {/* ─ ハンドルネーム ─ */}
            <div className="form-field">
              <label className="form-label">ハンドルネーム</label>
              <input
                className="form-input"
                type="text"
                placeholder="20文字以内"
                value={handle}
                maxLength={20}
                disabled={isCooling}
                onChange={e => { setHandle(e.target.value); setError(''); setSuccess(false); }}
                style={isCooling ? { opacity:.5, cursor:'not-allowed' } : {}}
              />
              {isCooling ? (
                <p className="form-hint" style={{ color:'var(--fire)' }}>
                  次の変更まであと {remainDays} 日。変更は7日に1回のみできます。
                </p>
              ) : (
                <p className="form-hint">変更後7日間は再変更できません。</p>
              )}
              {error   && <p className="form-error">{error}</p>}
              {success && <p style={{ fontSize:'10px', color:'var(--ocean)', marginTop:'4px', letterSpacing:'.06em' }}>✓ 保存しました</p>}
            </div>

            <button
              className="register-btn"
              onClick={handleSave}
              disabled={isCooling || !handle.trim() || saving}
            >
              {saving ? '保存中…' : '保存する'}
            </button>
          </div>
        </div>
      );
    }

    /* ── My Page ── */
    function MyPage({ session, onSignOut, bookmarks, onToggleBookmark, onHandleClick }) {
      const [profile,    setProfile]    = useState(null);
      const [posts,      setPosts]      = useState([]);
      const [editingId,  setEditingId]  = useState(null);
      const [editText,   setEditText]   = useState('');
      const [deletingId, setDeletingId] = useState(null);
      const [showEdit,   setShowEdit]   = useState(false);
      const [bmPosts,    setBmPosts]    = useState([]);

      useEffect(() => {
        if (!session) return;
        sb.from('profiles').select('*').eq('id', session.user.id).single()
          .then(({ data }) => setProfile(data));
        sb.from('posts').select('*').eq('user_id', session.user.id)
          .order('created_at', { ascending: false }).limit(20)
          .then(({ data }) => setPosts(data || []));
      }, [session?.user?.id]);

      // ブックマークした投稿を取得
      useEffect(() => {
        const ids = Object.keys(bookmarks || {});
        if (ids.length === 0) { setBmPosts([]); return; }
        sb.from('posts').select('*').in('id', ids)
          .order('created_at', { ascending: false })
          .then(({ data }) => setBmPosts(data || []));
      }, [bookmarks]);

      const shioriPosts = bmPosts.filter(p => bookmarks?.[p.id] === 'shiori');
      const fusenPosts  = bmPosts.filter(p => bookmarks?.[p.id] === 'fusen');

      async function handleSaveEdit(postId) {
        if (!editText.trim()) return;
        const { error } = await sb.from('posts')
          .update({ body: editText.trim() })
          .eq('id', postId).eq('user_id', session.user.id);
        if (!error) {
          setPosts(prev => prev.map(p => p.id === postId ? { ...p, body: editText.trim() } : p));
          setEditingId(null);
        }
      }

      async function handleDelete(postId) {
        const { error } = await sb.from('posts')
          .delete().eq('id', postId).eq('user_id', session.user.id);
        if (!error) {
          setPosts(prev => prev.filter(p => p.id !== postId));
          setDeletingId(null);
        }
      }

      const handle     = profile?.handle || session?.user?.user_metadata?.handle || '砂流れ';
      const joined     = session ? new Date(session.user.created_at) : new Date();
      const joinText   = `さら砂 ${joined.getFullYear()}年${joined.getMonth()+1}月から`;
      const totalWaves = posts.reduce((s, p) => s + (p.waves || 0), 0);

      if (showEdit) {
        return <ProfileEdit session={session} profile={profile}
          onBack={() => setShowEdit(false)}
          onSaved={newHandle => setProfile(p => ({ ...p, handle: newHandle }))}
        />;
      }

      return (
        <div className="screen my-screen">
          <div className="my-head">
            <div className="my-av" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'26px', fontWeight:500, color:'var(--ink-2)' }}>
              {handle.charAt(0)}
            </div>
            <div className="my-name">{handle}</div>
            <div className="my-since">{joinText}</div>
            {session && (
              <button className="my-edit-btn" onClick={() => setShowEdit(true)}>
                プロフィール編集
              </button>
            )}
          </div>

          <div className="my-stats">
            <div className="stat"><div className="stat-n">{posts.length}</div><div className="stat-l">流した瓶</div></div>
            <div className="stat"><div className="stat-n">0</div><div className="stat-l">スナトモ</div></div>
            <div className="stat"><div className="stat-n">{totalWaves}</div><div className="stat-l">受けた波音</div></div>
          </div>

          <AdBanner data={AD_MY} />

          {posts.length > 0 && (
            <div className="my-section">
              <p className="my-section-label">流した瓶</p>
              {posts.map(p => (
                <div key={p.id} className={`log-card${p.dest==='ocean' ? ' ocean-dest' : ' fire-dest'}`}>
                  {editingId === p.id ? (
                    <>
                      <textarea
                        className="log-edit-area"
                        value={editText}
                        onChange={e => setEditText(e.target.value)}
                        maxLength={5000}
                      />
                      <div className="log-edit-btns">
                        <button className="log-cancel-btn" onClick={() => setEditingId(null)}>キャンセル</button>
                        <button className="log-save-btn" onClick={() => handleSaveEdit(p.id)}>保存する</button>
                      </div>
                    </>
                  ) : (
                    <>
                      <p className="log-text">{p.body || p.text}</p>
                      <div className="log-meta">
                        <span className={p.dest==='ocean' ? 'log-dest-ocean' : 'log-dest-fire'}>
                          {p.dest==='ocean' ? '海に流した' : '焚き火に流した'}
                        </span>
                        <span>{timeAgo(p.created_at)}</span>
                      </div>
                      <div className="log-actions">
                        <button className="log-action-btn edit" onClick={() => { setEditingId(p.id); setEditText(p.body || ''); setDeletingId(null); }}>編集</button>
                        <button className="log-action-btn del"  onClick={() => { setDeletingId(p.id); setEditingId(null); }}>削除</button>
                      </div>
                      {deletingId === p.id && (
                        <div className="log-del-confirm">
                          <span className="log-del-msg">本当に削除しますか？</span>
                          <div style={{ display:'flex', gap:'8px' }}>
                            <button className="log-cancel-btn" onClick={() => setDeletingId(null)}>いいえ</button>
                            <button className="log-del-yes" onClick={() => handleDelete(p.id)}>削除</button>

          {shioriPosts.length > 0 && (
            <div className="my-section">
              <p className="my-section-label">しおり（{shioriPosts.length}/50）</p>
              <div className="novel-list">
                {shioriPosts.map(n => {
                  const m = (n.body || '').match(/^【(.+?)】\n?([\s\S]*)/);
                  return (
                    <div key={n.id} className="novel-card">
                      <div className="novel-body">
                        <div className="novel-title">{m ? m[1] : (n.body || '').slice(0,30)}</div>

                        <div>

          {fusenPosts.length > 0 && (
            <div className="my-section">
              <p className="my-section-label">付箋（{fusenPosts.length}/50）</p>

                    {onHandleClick ? <button className="letter-from-btn" onClick={() => onHandleClick(s.handle)}>{s.handle}</button> : s.handle}

                    <span className="letter-time">{timeAgo(s.created_at)}</span>

          <div className="my-section">
            <p className="my-section-label">このアプリについて</p>
            <div className="settings-list">
              <div className="settings-row">
                <span className="settings-key">SNS連携</span>
                <span className="no-badge">持たない</span>
              </div>
              <div className="settings-row">
                <span className="settings-key">ID検索</span>
                <span className="no-badge">持たない</span>
              </div>
              <div className="settings-row">
                <span className="settings-key">いいね / フォロワー数</span>
                <span className="no-badge">持たない</span>
              </div>
              <div className="settings-row">
                <span className="settings-key">引用 / 拡散機能</span>
                <span className="no-badge">持たない</span>

    /* ── App ── */
    function App() {
      const [step,    setStep]    = useState('loading'); /* loading | splash | register | login | verify | app */
      const [session, setSession] = useState(null);
      const [tab,     setTab]     = useState('ocean');
      const [viewedHandle, setViewedHandle] = useState(null);
      const [bookmarks, setBookmarks] = useState({}); // { post_id: 'shiori'|'fusen' }
      const [bmToast, setBmToast] = useState(null);

      // ブックマーク取得
      useEffect(() => {
        if (!session) { setBookmarks({}); return; }
        sb.from('bookmarks').select('post_id, kind').eq('user_id', session.user.id)
          .then(({ data }) => {
            const map = {};
            (data || []).forEach(b => { map[b.post_id] = b.kind; });
            setBookmarks(map);
          });
      }, [session?.user?.id]);

      async function toggleBookmark(postId, kind) {
        if (!session) {
          setBmToast({ type: 'error', msg: 'ログインが必要です' });
          setTimeout(() => setBmToast(null), 2400);
          return;
        }
        if (bookmarks[postId]) {
          // 外す
          await sb.from('bookmarks').delete().eq('user_id', session.user.id).eq('post_id', postId);
          setBookmarks(prev => { const n = {...prev}; delete n[postId]; return n; });
        } else {
          // 上限チェック
          const sameKindCount = Object.values(bookmarks).filter(k => k === kind).length;
          if (sameKindCount >= 50) {
            const label = kind === 'shiori' ? 'しおり' : '付箋';
            setBmToast({ type: 'limit', msg: `${label}は50枚まで。古いものを外してから挟んでください。` });
            setTimeout(() => setBmToast(null), 3200);
            return;
          }
          const { error } = await sb.from('bookmarks').insert({ user_id: session.user.id, post_id: postId, kind });
          if (!error) {
            setBookmarks(prev => ({ ...prev, [postId]: kind }));
          }
        }
      }

      useEffect(() => {
        // 開発者モード設定（?dev=1 で開発者として永続マーク）
        const params = new URLSearchParams(window.location.search);
        if (params.get('dev') === '1') {
          localStorage.setItem('sarasuna_dev', '1');
        }
        // 開発者でなければアクセスログを記録
        if (localStorage.getItem('sarasuna_dev') !== '1') {
          sb.from('page_views').insert({
            user_agent: navigator.userAgent.slice(0, 200),
            referrer: document.referrer.slice(0, 200) || null,
          }).then(() => {});
        }

        // 既存セッションを確認
        sb.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setStep(session ? 'app' : 'splash');
        });
        // 認証状態の変化を監視（SIGNED_IN のときだけアプリへ遷移）
        const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
          setSession(session);
          if (event === 'SIGNED_IN' && session) setStep('app');
          if (event === 'SIGNED_OUT') { setSession(null); setStep('splash'); }
        });
        return () => subscription.unsubscribe();
      }, []);

      async function handleSignOut() {
        await sb.auth.signOut();
        setSession(null);
        setTab('ocean');
        setStep('splash');
      }

      /* ─ 読込中 ─ */
      if (step === 'loading') {
        return (
          <div className="app-shell" style={{ alignItems:'center', justifyContent:'center', background:'var(--surface)' }}>
            <span style={{ fontFamily:"'Noto Serif JP',serif", fontSize:'12px', color:'var(--ink-3)', letterSpacing:'.16em' }}>読み込み中…</span>
          </div>
        );
      }

      if (step === 'splash')
        return <div className="app-shell"><Splash onEnter={() => setStep('register')} /></div>;
      if (step === 'register')
        return <div className="app-shell"><Register onRegistered={() => setStep('app')} onLogin={() => setStep('login')} /></div>;
      if (step === 'login')
        return <div className="app-shell"><Login onLoggedIn={() => {}} onBack={() => setStep('register')} /></div>;

      const changeTab = (t) => { setViewedHandle(null); setTab(t); };

      return (
        <div className="app-shell">
          <Sidebar current={tab} onChange={changeTab} />
          <div className="content-wrap">
            {tab === 'write' ? (
              <Write session={session} onSent={dest => changeTab(dest === '海' ? 'ocean' : 'bonfire')} />
            ) : (
              viewedHandle ? (
                <UserNotebook handle={viewedHandle} onBack={() => setViewedHandle(null)} bookmarks={bookmarks} onToggleBookmark={toggleBookmark} />
              ) : (
                <div className="screen">
                  {tab === 'ocean'    && <Ocean session={session} onHandleClick={setViewedHandle} bookmarks={bookmarks} onToggleBookmark={toggleBookmark} />}
                  {tab === 'bonfire'  && <Bonfire session={session} />}
                  {tab === 'naminoto' && <Naminoto />}
                  {tab === 'my'       && <MyPage session={session} onSignOut={handleSignOut} bookmarks={bookmarks} onToggleBookmark={toggleBookmark} onHandleClick={setViewedHandle} />}
                </div>
              )
            )}
            <NavBar current={tab} onChange={changeTab} />
            {bmToast && (
              <div className="filter-toast">
                <span className="filter-toast-icon">📎</span>
                <div className="filter-toast-body">
                  <div className="filter-toast-msg" style={{ color: 'var(--ink)' }}>{bmToast.msg}</div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
