              <div className="splash-d-dot" />
              <div className="splash-d-line" />
            </div>
            <p className="splash-tagline">もう一度、人に戻るSNS</p>
            <button className="enter-btn" onClick={onEnter}>砂浜へ</button>
          </div>
        </div>
      );
    }

    /* ── Sidebar（デスクトップ） ── */
    function Sidebar({ current, onChange }) {
      const SIDE_SPARKLES = [
        { top:'22%', left:'76%', size:'9px',  delay:'0s',   color:'#38BF80' },
        { top:'48%', left:'82%', size:'7px',  delay:'1.6s', color:'#3AACDC' },
        { top:'70%', left:'78%', size:'8px',  delay:'2.8s', color:'#2EC898' },
      ];
      return (
        <aside className="sidebar">
          {SIDE_SPARKLES.map((s, i) => (
            <span key={i} className="splash-sparkle"
              style={{ top:s.top, left:s.left, fontSize:s.size, color:s.color, animationDelay:s.delay }}>✦</span>
          ))}
          <div className="sidebar-logo-area">
            <span className="sidebar-logo-ja">SARASUNA</span>
            <p className="sidebar-tagline">もう一度、人に戻るSNS</p>
          </div>
          <nav className="sidebar-nav">
            {NAV.map(item => {
              const active = current === item.id;
              return (
                <button
                  key={item.id}
                  className={`sidebar-item${active ? (item.fire ? ' active fire-active' : ' active') : ''}`}
                  onClick={() => onChange(item.id)}
                >
                  <span className="sidebar-icon">{item.icon}</span>
                  <span className="sidebar-label">{item.label}</span>
                </button>
              );
            })}
          </nav>
          <div className="sidebar-footer">
          </div>
        </aside>
      );
    }

    /* ── Nav ── */
    const NAV = [
      { id:'ocean',    icon:'海', label:'海'    },
      { id:'bonfire',  icon:'火', label:'焚き火', fire:true },
      { id:'write',    icon:'書', label:'書く'  },
      { id:'naminoto', icon:'波', label:'波音'  },
      { id:'my',       icon:'己', label:'自分'  },
    ];

    function NavBar({ current, onChange }) {
      return (
        <nav className="nav">
          {NAV.map(item => {
            const active = current === item.id;
            return (
              <button
                key={item.id}
                className={`nav-item${active ? (item.fire ? ' active fire-active' : ' active') : ''}`}
                onClick={() => onChange(item.id)}
              >
                <span className="nav-icon">{item.icon}</span>
                <span className="nav-label">{item.label}</span>
              </button>
            );
          })}
        </nav>
      );
    }

    /* ── AdBanner ── 横長コンパクト広告（波音・自分・送信完了） */
    function AdBanner({ data }) {
      return (
        <div className="ad-banner">
          <div className="ad-banner-promo">Promotion</div>
          <div className="ad-banner-visual" style={{ background: data.bg }} />
          <div className="ad-banner-body">
            <p className="ad-banner-copy">{data.copy}</p>
            <p className="ad-banner-brand">{data.brand}</p>
          </div>
        </div>
      );
    }

    /* ── LetterCard ── 波が引くアニメーション付き */
    function LetterCard({ data, index, receding, onTap }) {
      const [waved, setWaved] = useState(false);
      const [count, setCount] = useState(data.waves || data.waves_count || 0);

      async function handleWave(e) {
        e.stopPropagation();
        if (waved) return;
        setWaved(true);
        setCount(c => c + 1);
        if (data.id && typeof data.id === 'string' && data.id.includes('-')) {
          await sb.from('posts').update({ waves: (data.waves || 0) + 1 }).eq('id', data.id);
        }
      }

      return (
        <div
          className={`letter-card${receding ? ' receding' : ''}`}
          data-v={index % 5}
          onClick={() => onTap(data.id)}
        >
          <div className="letter-from">{data.handle}</div>
          <p className="letter-body">{data.body || data.text}</p>
          <div className="letter-foot">
            <span className="letter-time">{data.time || timeAgo(data.created_at)}</span>
            <button className={`wave-btn${waved ? ' waved' : ''}`} onClick={handleWave}>
              <span>〰</span><span>{count}</span>
            </button>
          </div>
        </div>
      );
    }

    /* ── AdCard ── インフィード広告（海・焚き火） */
    function AdCard({ data }) {
      return (
        <div className="ad-card">
          <div className="ad-promo-label">Promotion</div>
          <div className="ad-visual" style={{ background: data.bg }} />
          <div className="ad-body">
            <p className="ad-copy">{data.copy}</p>
            <p className="ad-brand">{data.brand}</p>
          </div>
        </div>
      );
    }

    /* ── Ocean ── */
    function Ocean() {
      const [tab, setTab]             = useState('short');
      const [recedingId, setReceding] = useState(null);
      const [dbPosts,  setDbPosts]    = useState(null); // null = 読込中
      const [dbNovels, setDbNovels]   = useState(null);

      useEffect(() => {
        // titleがnullのものをショート日記、titleがあるものを日記小説とみなす
        sb.from('posts').select('*').eq('dest', 'ocean')
          .order('created_at', { ascending: false }).limit(50)
          .then(({ data, error }) => {
            if (error) console.error('posts fetch error:', error);
            const all = data || [];
            // 【タイトル】で始まるものを日記小説、それ以外をショート日記に分類
            setDbPosts(all.filter(p => !(p.body || '').startsWith('【')));
            setDbNovels(all.filter(p => (p.body || '').startsWith('【')));
          });
      }, []);

      function handleTap(id) {
        setReceding(id);
        setTimeout(() => setReceding(null), 700);
      }

      // DBが空のときは静的フォールバックを使う
      const shortItems = (dbPosts  && dbPosts.length  > 0) ? dbPosts  : (dbPosts  === null ? [] : SHORT_DIARIES);
      const novelItems = (dbNovels && dbNovels.length > 0) ? dbNovels : (dbNovels === null ? [] : DIARY_NOVELS);

      function buildTimeline() {
        const nodes = [];
        shortItems.forEach((item, i) => {
          nodes.push(
            <LetterCard key={item.id} data={item} index={i} receding={recedingId === item.id} onTap={handleTap} />
          );
          const adKey = i + 1;
          if (ADS[adKey]) nodes.push(<AdCard key={ADS[adKey].id} data={ADS[adKey]} />);
        });
        return nodes;
      }

      return (
        <div className="screen ocean-screen">
          <div className="ocean-header">
            <div className="ocean-header-top">
              <div className="screen-title">海</div>
              <div className="screen-sub">漂着したメッセージ</div>
            </div>
            <div className="ocean-tabs">
              <button className={`ocean-tab${tab==='short'?' active':''}`} onClick={() => setTab('short')}>ショート日記</button>
              <button className={`ocean-tab${tab==='novel'?' active':''}`} onClick={() => setTab('novel')}>日記小説</button>
            </div>
          </div>

          {tab === 'short' && (
            dbPosts === null ? (
              <p style={{ textAlign:'center', padding:'40px 20px', color:'var(--ink-3)', fontSize:'12px', letterSpacing:'.1em', fontFamily:"'Noto Serif JP',serif" }}>読み込み中…</p>
            ) : shortItems.length === 0 ? (
              <p style={{ textAlign:'center', padding:'48px 24px', color:'var(--ink-3)', fontSize:'13px', lineHeight:2.2, letterSpacing:'.08em', fontFamily:"'Noto Serif JP',serif" }}>
                まだ瓶は届いていない。<br />最初の一通を流してみよう。
              </p>
            ) : (
              <div className="letter-list">{buildTimeline()}</div>
            )
          )}

          {tab === 'novel' && (
            dbNovels === null ? (
              <p style={{ textAlign:'center', padding:'40px 20px', color:'var(--ink-3)', fontSize:'12px', letterSpacing:'.1em', fontFamily:"'Noto Serif JP',serif" }}>読み込み中…</p>
            ) : (
              <div className="novel-list">
                {novelItems.map(n => (
                  <div key={n.id} className="novel-card">
                    <div className="novel-body">
                      {(() => {
                        const raw = n.body || n.text || '';
                        const m = raw.match(/^【(.+?)】\n?([\s\S]*)/);
                        return <>
                          <div className="novel-title">{m ? m[1] : (n.title || raw.slice(0,30))}</div>
                          <p className="novel-excerpt">{n.excerpt || (m ? m[2] : raw)}</p>
                        </>;
                      })()}
                    </div>
                    <div className="novel-foot">
                      <div>
                        <div className="novel-from">{n.handle}</div>
                        <div className="novel-time">{n.time || timeAgo(n.created_at)}</div>
                      </div>
                      <span className="novel-read">続きを読む →</span>
                    </div>
                  </div>
                ))}
              </div>
            )
          )}
        </div>
      );
    }

    /* ── Bonfire ── */
    function Bonfire({ session }) {
      const [view,        setView]       = useState('list');
      const [rooms,       setRooms]      = useState(null); // null = 読込中
      const [activeRoom,  setActiveRoom] = useState(null);
      const [messages,    setMessages]   = useState([]);
      const [newMsg,      setNewMsg]     = useState('');
      const [newName,     setNewName]    = useState('');
      const [filterErr,   setFilterErr]  = useState(null);
      const [sending,     setSending]    = useState(false);
      const [deletingRoom, setDeletingRoom] = useState(null);
      const messagesEndRef = useRef(null);

      /* ルーム一覧を読み込む */
      useEffect(() => {
        sb.from('rooms').select('*').order('created_at', { ascending: false })
          .then(({ data }) => setRooms(data || []));
      }, []);

      /* チャット表示時：既存メッセージ読み込み ＋ リアルタイム購読 */
      useEffect(() => {
        if (view !== 'chat' || !activeRoom) return;
        setMessages([]);
        sb.from('messages').select('*').eq('room_id', activeRoom.id)
          .order('created_at', { ascending: true }).limit(100)
          .then(({ data }) => setMessages(data || []));
        const channel = sb.channel(`room:${activeRoom.id}`)
          .on('postgres_changes', {
            event: 'INSERT', schema: 'public', table: 'messages',
            filter: `room_id=eq.${activeRoom.id}`,
          }, payload => setMessages(prev => [...prev, payload.new]))
          .subscribe();
        return () => { sb.removeChannel(channel); };
      }, [view, activeRoom?.id]);

      /* チャット最下部へスクロール */
      useEffect(() => {
        if (view === 'chat' && messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [messages, view]);

      /* メッセージ送信 */
      async function handleSendMsg() {
        const text = newMsg.trim();
        if (!text || !activeRoom || sending) return;
        const violation = checkContent(text);
        if (violation) { setFilterErr(violation); return; }
        if (!session) { setFilterErr('login_required'); return; }
        setSending(true);
        const { data: prof } = await sb.from('profiles').select('handle').eq('id', session.user.id).single();
        const handle = prof?.handle || session.user.user_metadata?.handle || '砂流れ';
        await sb.from('messages').insert({ room_id: activeRoom.id, user_id: session.user.id, handle, body: text });
        setSending(false);
        setNewMsg('');
      }

      /* ルーム削除 */
      async function handleDeleteRoom(roomId) {
        // メッセージを先に削除してからルームを削除
        await sb.from('messages').delete().eq('room_id', roomId);
        const { error } = await sb.from('rooms').delete().eq('id', roomId).eq('created_by', session.user.id);
        if (!error) {
          setRooms(prev => prev.filter(r => r.id !== roomId));
          setDeletingRoom(null);
        }
      }

      /* ルーム作成 */
      async function handleCreateRoom() {
        if (!newName.trim() || !session) return;
        const violation = checkContent(newName);
        if (violation) { setFilterErr(violation); return; }
        const { data, error } = await sb.from('rooms')
          .insert({ created_by: session.user.id, name: newName.trim() }).select().single();
        if (!error && data) {
          setRooms(prev => [data, ...(prev || [])]);
          setNewName('');
          setView('list');
        }
      }

      /* ─ チャット画面 ─ */
      if (view === 'chat' && activeRoom) {
        return (
          <div className="chat-shell">
            {filterErr && <FilterToast type={filterErr} onClose={() => setFilterErr(null)} />}
            <div className="chat-header">
              <button className="chat-back" onClick={() => { setView('list'); setMessages([]); }}>←</button>
              <div className="chat-room-info">
                <div className="chat-room-name">{activeRoom.name}</div>
                <div className="chat-room-meta">焚き火を囲んでいる</div>
              </div>
            </div>
            <div className="chat-messages">
              {messages.length === 0 && (
                <p style={{ textAlign:'center', color:'#6A5A44', fontSize:'12px', marginTop:'24px', letterSpacing:'.08em', fontFamily:"'Noto Serif JP',serif" }}>
                  まだ誰もいない。<br />最初の言葉を灯してみよう。
                </p>
              )}
              {messages.map(m => {
                const isMe = session && m.user_id === session.user.id;
                return (
                  <div key={m.id} className={`chat-msg${isMe ? ' me' : ' other'}`}>
                    {!isMe && <div className="chat-msg-handle">{m.handle}</div>}
                    <div className="chat-msg-bubble">{m.body || m.text}</div>
                    <div className="chat-msg-time">{timeAgo(m.created_at)}</div>
                  </div>
                );
              })}
              <div ref={messagesEndRef} />
            </div>
            <div className="chat-input-area">
              <textarea
                className="chat-textarea"
                placeholder={session ? '焚き火に言葉を灯す…' : 'ログインすると発言できます'}
                rows={1}
                value={newMsg}
                onChange={e => setNewMsg(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMsg(); } }}
                disabled={!session}
              />
              <button className="chat-send-btn" onClick={handleSendMsg} disabled={!newMsg.trim() || sending || !session}>↑</button>
            </div>
          </div>
        );
      }

      /* ─ コミュニティ作成画面 ─ */
      if (view === 'create') {
        return (
          <div className="create-shell">
            {filterErr && <FilterToast type={filterErr} onClose={() => setFilterErr(null)} />}
            <div className="create-header">
              <button className="chat-back" onClick={() => setView('list')}>←</button>
              <span className="create-title-text">新しい焚き火を作る</span>
            </div>
            <div className="create-body">
              <p className="create-label">焚き火の名前</p>
              <input
                className="create-input" type="text"
                placeholder="例：深夜に絵を描く人たち"
                value={newName} onChange={e => setNewName(e.target.value)} maxLength={30}
              />
              <button className="create-submit-btn" onClick={handleCreateRoom} disabled={!newName.trim()}>
                焚き火を囲む
              </button>
            </div>
          </div>
        );
      }

      /* ─ ルーム一覧 ─ */
      const roomList = rooms || [];
      return (
        <div className="screen bonfire-screen">
          <div className="bonfire-header">
            <div className="screen-title">焚き火</div>
            <div className="screen-sub">共通の趣味だけで集まる場所</div>
          </div>
          {rooms === null && (
            <p style={{ textAlign:'center', padding:'30px 20px', color:'#6A5A44', fontSize:'12px', letterSpacing:'.08em', fontFamily:"'Noto Serif JP',serif" }}>読み込み中…</p>
          )}
          {roomList.map((room, i) => (
            <div key={room.id}>
              <div className="room-card">
                <div className="room-head" style={{ cursor:'pointer' }} onClick={() => { setActiveRoom(room); setView('chat'); setDeletingRoom(null); }}>
                  <div>
                    <div className="room-name">{room.name}</div>
                    <div className="room-meta">焚き火を囲む</div>
                  </div>
                  <span style={{ marginLeft:'auto', fontSize:'13px', color:'#6A5A44', flexShrink:0 }}>›</span>
                </div>
                {session && room.created_by === session.user.id && (
                  <div style={{ padding:'8px 16px 10px', borderTop:'1px solid rgba(232,110,30,.08)', display:'flex', justifyContent:'flex-end' }}>
                    {deletingRoom === room.id ? (
                      <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
                        <span style={{ fontSize:'11px', color:'#C86018', letterSpacing:'.06em' }}>削除しますか？</span>
                        <button onClick={() => setDeletingRoom(null)}
                          style={{ background:'none', border:'none', cursor:'pointer', fontSize:'11px', color:'#6A5A44', fontFamily:"'Noto Serif JP',serif" }}>いいえ</button>
                        <button onClick={() => handleDeleteRoom(room.id)}
                          style={{ background:'#C86018', border:'none', cursor:'pointer', fontSize:'11px', color:'#FFF8F0', padding:'3px 12px', borderRadius:'8px', fontFamily:"'Noto Serif JP',serif", letterSpacing:'.08em' }}>削除</button>
                      </div>
                    ) : (
                      <button onClick={() => setDeletingRoom(room.id)}
                        style={{ background:'none', border:'none', cursor:'pointer', fontSize:'10px', color:'#6A5A44', letterSpacing:'.1em', fontFamily:"'Noto Serif JP',serif" }}>
                        この焚き火を消す
                      </button>
                    )}
                  </div>
                )}
              </div>
              {i === 0 && <AdCard data={AD_BONFIRE} />}
            </div>
          ))}
          {rooms !== null && roomList.length === 0 && (
            <p style={{ textAlign:'center', padding:'30px 20px', color:'#6A5A44', fontSize:'13px', lineHeight:2.2, letterSpacing:'.08em', fontFamily:"'Noto Serif JP',serif" }}>
              まだ焚き火がない。<br />最初に灯してみよう。
            </p>
          )}
          <button className="room-create-card" onClick={() => setView('create')}>
            <span style={{ fontSize:'18px' }}>＋</span>
            <span>新しい焚き火を作る</span>
          </button>
          <div style={{ height:'24px' }} />
        </div>
      );
    }

    /* ── Write ── */
    /* ── FilterToast ── */
    function FilterToast({ type, onClose }) {
      useEffect(() => {
        const t = setTimeout(onClose, 3800);
        return () => clearTimeout(t);
      }, []);
      const MSG = {
        hate:     { title: 'ヘイトコンテンツは投稿できません',   sub: 'さら砂は誰もが安心できる場所を目指しています。' },
        adult:    { title: 'アダルトコンテンツは投稿できません', sub: 'このサービスはアダルトコンテンツを許可していません。' },
        personal: { title: '個人情報は投稿できません',           sub: '電話番号・メールアドレス・住所などの投稿はお断りしています。' },
      };
      const m = MSG[type] || MSG.hate;
      return (
        <div className="filter-toast">
          <span className="filter-toast-icon" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'14px', fontWeight:500, color:'#C84040' }}>禁</span>
          <div className="filter-toast-body">
            <p className="filter-toast-title">{m.title}</p>
            <p className="filter-toast-msg">{m.sub}</p>
          </div>
        </div>
      );
    }

    function Write({ session, onSent }) {
      const [mode, setMode]           = useState('short');
      const [shortText, setShort]     = useState(() => localStorage.getItem(SAVE_SHORT) || '');
      const [novelTitle, setTitle]    = useState(() => localStorage.getItem(SAVE_TITLE) || '');
      const [novelText, setNovel]     = useState(() => localStorage.getItem(SAVE_NOVEL) || '');
      const [savedMsg, setSaved]      = useState(false);
      const [sent, setSent]           = useState(null);
      const [filterErr, setFilterErr] = useState(null);
      const [sending, setSending]     = useState(false);
      const timer = useRef(null);

      function autosave(key, val) {
        clearTimeout(timer.current);
        timer.current = setTimeout(() => {
          localStorage.setItem(key, val);
          setSaved(true);
          setTimeout(() => setSaved(false), 1600);
        }, 700);
      }

      const today = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
      const canSend = mode === 'short' ? shortText.trim().length > 0 : novelText.trim().length > 0 && novelTitle.trim().length > 0;

      async function handleSend(dest) {
        if (!canSend || sending) return;
        const target = mode === 'short' ? shortText : novelTitle + ' ' + novelText;
        const violation = checkContent(target);
        if (violation) { setFilterErr(violation); return; }
        setSending(true);
        if (session) {
          const { data: prof } = await sb.from('profiles').select('handle').eq('id', session.user.id).single();
          const handle = prof?.handle || session.user.user_metadata?.handle || '砂流れ';
          const body = mode === 'novel' && novelTitle
            ? `【${novelTitle}】\n${novelText}`
            : (mode === 'short' ? shortText : novelText);
          const { error: insertErr } = await sb.from('posts').insert({
            user_id: session.user.id,
            handle,
            dest: dest === '海' ? 'ocean' : 'bonfire',
            body,
          });
          if (insertErr) console.error('insert error:', insertErr);
        }
        setSending(false);
        setSent(dest);
        setTimeout(() => {
          if (mode === 'short') { setShort(''); localStorage.removeItem(SAVE_SHORT); }
          else { setNovel(''); setTitle(''); localStorage.removeItem(SAVE_NOVEL); localStorage.removeItem(SAVE_TITLE); }
          setSent(null);
          onSent(dest);
        }, 2600);
      }

      if (sent) {
        return (
          <div className="write-shell">
            <div className="sent-view">
              <div className="sent-icon" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'52px', fontWeight:300, color: sent==='海' ? 'var(--ocean)' : '#E87828' }}>
                {sent === '海' ? '海' : '火'}
              </div>
              <p className="sent-title">{sent === '海' ? '瓶を海に流しました。\nどこかの浜辺に届くかもしれない。' : '焚き火に流しました。\n仲間に届きますように。'}</p>
              <p className="sent-note">さらさらと、手放せた。</p>
              <AdBanner data={AD_SENT} />
            </div>
          </div>
        );
      }

      return (
        <div className="write-shell">
          {filterErr && <FilterToast type={filterErr} onClose={() => setFilterErr(null)} />}
          {/* ヘッダー（固定） */}
          <div className="write-header">
            <div className="write-header-top">
              <div className="screen-title">書く</div>
              <div className="screen-sub">{today}</div>
            </div>
            <div className="write-mode-tabs">
              <button className={`write-mode-tab${mode==='short'?' active':''}`} onClick={() => setMode('short')}>ショート日記</button>
              <button className={`write-mode-tab${mode==='novel'?' active':''}`} onClick={() => setMode('novel')}>日記小説</button>
            </div>
          </div>

          {/* スクロール領域 */}
          <div className="write-body">
            {mode === 'short' && (
              <div className="write-paper">
                <textarea
                  className="write-area"
                  placeholder="さらさらと、流してみる。"
                  value={shortText}
                  onChange={e => { setShort(e.target.value); autosave(SAVE_SHORT, e.target.value); }}
                  maxLength={300}
                />
                <div className="write-count">{shortText.length} / 300</div>
              </div>
            )}

            {mode === 'novel' && (
              <div className="manuscript-paper">
                <input
                  className="manuscript-title"
                  placeholder="タイトル"
                  value={novelTitle}
                  onChange={e => { setTitle(e.target.value); autosave(SAVE_TITLE, e.target.value); }}
                  maxLength={60}
                />
                <textarea
                  className="novel-area"
                  placeholder={"自分の経験や思考を、\n物語のように綴る。"}
                  value={novelText}
                  onChange={e => { setNovel(e.target.value); autosave(SAVE_NOVEL, e.target.value); }}
                  maxLength={5000}
                />
                <div className="novel-count">
                  <span className={`autosave-indicator${savedMsg ? ' on' : ''}`}>✓ 自動保存済み</span>
                  <span>{novelText.length} / 5000</span>
                </div>
              </div>
            )}
          </div>

          {/* 送信（固定） */}
          <div className="send-area">
            <p className="send-label">どこへ流しますか</p>
            <div className="send-btns">
              <button className="send-btn fire"  onClick={() => handleSend('焚き火')} disabled={!canSend || sending}>
                <span className="send-btn-icon" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'18px', fontWeight:400 }}>火</span>
                焚き火に流す
              </button>
              <button className="send-btn ocean" onClick={() => handleSend('海')}    disabled={!canSend || sending}>
                <span className="send-btn-icon" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'18px', fontWeight:400 }}>海</span>
                海に流す
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Naminoto ── */
    function Naminoto() {
      const total    = NAMINOTO_STATIC.length;
      const sunatomo = NAMINOTO_STATIC.filter(i => i.isSunatomo).length;
      return (
        <div className="screen naminoto-screen">
          <div className="naminoto-header">
            <div className="screen-title">波音</div>
            <div className="screen-sub">浜辺に届いた気配</div>
          </div>
          <div className="wave-count-card">
            <div className="wave-big">{total}</div>
            <p className="wave-label">今日の波音</p>
            <p className="wave-detail">スナトモ {sunatomo} 件 · 名も知らぬ波 {total - sunatomo} 件</p>
            <div><span className="wave-expire">48時間後に消えていく</span></div>
          </div>
          <p className="wave-section">ひとつひとつの波音</p>
          <div className="wave-list">
            {NAMINOTO_STATIC.map(item => (
              <div key={item.id} className={`wave-item${item.isSunatomo ? ' sunatomo' : ''}`}>
                <div className={`wave-avatar${item.isSunatomo ? '' : ' unknown'}`}
                  style={ item.isSunatomo ? { fontFamily:"'Shippori Mincho',serif", fontSize:'13px', fontWeight:500 } : {} }>
                  {item.isSunatomo ? item.handle.charAt(0) : '—'}
                </div>
                <div className="wave-info">
                  <p className="wave-name">{item.isSunatomo ? item.handle : '名も知らぬ波'}</p>
                  <p className="wave-note">{item.note}</p>
                </div>
                <span className="wave-time">{item.time}</span>
                {item.isSunatomo && <div className="wave-dot" />}
              </div>
            ))}
          </div>
          <AdBanner data={AD_NAMINOTO} />
          <p className="naminoto-note">波音は48時間で消えていく。<br />執着せず、さらさらと。</p>
        </div>
      );
    }

    /* ── Register ── */
    function Register({ onRegistered, onLogin }) {
      const [email,     setEmail]    = useState('');
      const [password,  setPassword] = useState('');
      const [showPw,    setShowPw]   = useState(false);
      const [birthYear, setBirth]    = useState('');
      const [handle,    setHandle]   = useState('');
      const [agreed,    setAgreed]   = useState(false);
      const [errors,    setErrors]   = useState({});
      const [loading,   setLoading]  = useState(false);

      const maxYear = new Date().getFullYear() - 13;
      const years = [];
      for (let y = maxYear; y >= 1924; y--) years.push(y);

      function validate() {
        const e = {};
        if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = 'メールアドレスの形式が正しくありません';
        if (password.length < 8) e.password = '8文字以上で設定してください';
        if (!birthYear) e.birth = '生まれた年を選んでください';
        if (!handle.trim()) e.handle = 'ハンドルネームを入力してください';
        if (!agreed) e.agreed = '利用規約への同意が必要です';
        return e;
      }

      async function handleSubmit() {
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        setLoading(true);
        const { error } = await sb.auth.signUp({
          email,
          password,
          options: {
            data: { handle: handle.trim(), birth_year: parseInt(birthYear) },
          },
        });
        setLoading(false);
        if (error) {
          const msg = error.message.includes('already') ? 'このメールアドレスはすでに登録されています' : error.message;
          setErrors({ email: msg });
          return;
        }
        onRegistered();
      }

      const canSubmit = email && password.length >= 8 && birthYear && handle.trim() && agreed && !loading;

      return (
        <div className="register-shell">
          <div className="register-scroll">
            <div className="register-logo-area">
              <span className="splash-logo" style={{ fontSize:'20px', letterSpacing:'.48em' }}>SARASUNA</span>
              <div className="register-divider-line"><div className="register-divider-dot" /></div>
              <p className="register-subtitle">さら砂へようこそ<br />はじめての方は登録してください</p>
            </div>

            <div className="form-field">
              <label className="form-label">メールアドレス</label>
              <input className="form-input" type="email" placeholder="example@mail.com"
                value={email} onChange={e => { setEmail(e.target.value); setErrors(p => ({...p, email:null})); }} />
              {errors.email && <p className="form-error">{errors.email}</p>}
            </div>

            <div className="form-field">
              <label className="form-label">パスワード</label>
              <div className="pw-wrap">
                <input className="form-input" type={showPw ? 'text' : 'password'} placeholder="8文字以上"
                  value={password} onChange={e => { setPassword(e.target.value); setErrors(p => ({...p, password:null})); }} />
                <button className="pw-toggle" type="button" onClick={() => setShowPw(v => !v)}>
                  {showPw ? '隠す' : '表示'}
                </button>
              </div>
              {errors.password && <p className="form-error">{errors.password}</p>}
            </div>

            <div className="form-field">
              <label className="form-label">生まれた年</label>
              <select className="form-select" value={birthYear}
                onChange={e => { setBirth(e.target.value); setErrors(p => ({...p, birth:null})); }}>
                <option value="">選択してください</option>
                {years.map(y => <option key={y} value={y}>{y}年</option>)}
              </select>
              <p className="form-hint">13歳未満の方はご利用いただけません</p>
              {errors.birth && <p className="form-error">{errors.birth}</p>}
            </div>

            <div className="form-field">
              <label className="form-label">ハンドルネーム</label>
              <input className="form-input" type="text" placeholder="砂時計、夜の波… (20文字以内)"
                value={handle} maxLength={20}
                onChange={e => { setHandle(e.target.value); setErrors(p => ({...p, handle:null})); }} />
              <p className="form-hint">アプリ内での表示名です。本名は不要です。</p>
              {errors.handle && <p className="form-error">{errors.handle}</p>}
            </div>

            <div className="form-check">
              <input type="checkbox" id="tos" checked={agreed}
                onChange={e => { setAgreed(e.target.checked); setErrors(p => ({...p, agreed:null})); }} />
              <label className="form-check-label" htmlFor="tos">
                <button className="form-check-link" type="button">利用規約</button>および
                <button className="form-check-link" type="button">プライバシーポリシー</button>に同意します
              </label>
            </div>
            {errors.agreed && <p className="form-error" style={{ marginTop:'-12px', marginBottom:'16px' }}>{errors.agreed}</p>}

            <button className="register-btn" onClick={handleSubmit} disabled={!canSubmit}>
              {loading ? '登録中…' : '砂浜に登録する'}
            </button>

            <div className="register-login-wrap">
              すでにアカウントをお持ちの方は&nbsp;
              <button className="register-login-btn" onClick={onLogin}>ログイン</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Login ── */
    function Login({ onLoggedIn, onBack }) {
      const [email,    setEmail]    = useState('');
      const [password, setPassword] = useState('');
      const [showPw,   setShowPw]   = useState(false);
      const [error,    setError]    = useState('');
      const [loading,  setLoading]  = useState(false);

      async function handleLogin() {
        if (!email || !password) { setError('メールアドレスとパスワードを入力してください'); return; }
        setLoading(true);
        const { error: err } = await sb.auth.signInWithPassword({ email, password });
        setLoading(false);
        if (err) {
          setError('メールアドレスまたはパスワードが正しくありません');
          return;
        }
        onLoggedIn(); // onAuthStateChange が session をセットするため no-op でOK
      }

      return (
        <div className="register-shell">
          <div className="register-scroll">
            <div className="register-logo-area">
              <span className="splash-logo" style={{ fontSize:'20px', letterSpacing:'.48em' }}>SARASUNA</span>
              <div className="register-divider-line"><div className="register-divider-dot" /></div>
              <p className="register-subtitle">おかえりなさい</p>
            </div>

            <div className="form-field">
              <label className="form-label">メールアドレス</label>
              <input className="form-input" type="email" placeholder="example@mail.com"
                value={email} onChange={e => { setEmail(e.target.value); setError(''); }} />
            </div>

            <div className="form-field">
              <label className="form-label">パスワード</label>
              <div className="pw-wrap">
                <input className="form-input" type={showPw ? 'text' : 'password'} placeholder="パスワード"
                  value={password} onChange={e => { setPassword(e.target.value); setError(''); }} />
                <button className="pw-toggle" type="button" onClick={() => setShowPw(v => !v)}>
                  {showPw ? '隠す' : '表示'}
                </button>
              </div>
            </div>

            {error && <p className="form-error" style={{ marginBottom:'14px' }}>{error}</p>}

            <button className="register-btn" onClick={handleLogin} disabled={!email || !password || loading}>
              {loading ? 'ログイン中…' : '砂浜へ'}
            </button>

            <div className="register-login-wrap" style={{ marginTop:'20px' }}>
              <button className="register-login-btn" onClick={onBack}>← 登録画面に戻る</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── VerifyEmail ── */
    function VerifyEmail({ email, onVerified }) {
      return (
        <div className="verify-screen">
          <div className="verify-icon" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'44px', fontWeight:300, color:'var(--ocean)', letterSpacing:0 }}>届</div>
          <h2 className="verify-title">認証メールを送りました</h2>
          <p className="verify-email-addr">{email}</p>
          <p className="verify-note">
            メール内のリンクをタップして<br />登録を完了してください。
          </p>
          <button className="enter-btn" onClick={onVerified}>
            認証が完了したら砂浜へ
          </button>
          <p className="verify-hint">※ 届かない場合は迷惑メールフォルダをご確認ください</p>
        </div>
      );
    }

    /* ── My Page ── */
    function MyPage({ session, onSignOut }) {
      const [profile,    setProfile]    = useState(null);
      const [posts,      setPosts]      = useState([]);
      const [editingId,  setEditingId]  = useState(null);
      const [editText,   setEditText]   = useState('');
      const [deletingId, setDeletingId] = useState(null);

      useEffect(() => {
        if (!session) return;
        sb.from('profiles').select('*').eq('id', session.user.id).single()
          .then(({ data }) => setProfile(data));
        sb.from('posts').select('*').eq('user_id', session.user.id)
          .order('created_at', { ascending: false }).limit(20)
          .then(({ data }) => setPosts(data || []));
      }, [session?.user?.id]);

      async function handleSaveEdit(postId) {
        if (!editText.trim()) return;
        const { error } = await sb.from('posts')
          .update({ body: editText.trim() })
          .eq('id', postId).eq('user_id', session.user.id);
        if (!error) {
          setPosts(prev => prev.map(p => p.id === postId ? { ...p, body: editText.trim() } : p));
          setEditingId(null);
        }
      }

      async function handleDelete(postId) {
        const { error } = await sb.from('posts')
          .delete().eq('id', postId).eq('user_id', session.user.id);
        if (!error) {
          setPosts(prev => prev.filter(p => p.id !== postId));
          setDeletingId(null);
        }
      }

      const handle     = profile?.handle || session?.user?.user_metadata?.handle || '砂流れ';
      const joined     = session ? new Date(session.user.created_at) : new Date();
      const joinText   = `さら砂 ${joined.getFullYear()}年${joined.getMonth()+1}月から`;
      const totalWaves = posts.reduce((s, p) => s + (p.waves || 0), 0);

      return (
        <div className="screen my-screen">
          <div className="my-head">
            <div className="my-av" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'28px', fontWeight:400, color:'var(--ink-2)' }}>
              {handle.charAt(0)}
            </div>
            <div className="my-name">{handle}</div>
            <div className="my-since">{joinText}</div>
          </div>

          <div className="my-stats">
            <div className="stat"><div className="stat-n">{posts.length}</div><div className="stat-l">流した瓶</div></div>
            <div className="stat"><div className="stat-n">0</div><div className="stat-l">スナトモ</div></div>
            <div className="stat"><div className="stat-n">{totalWaves}</div><div className="stat-l">受けた波音</div></div>
          </div>

          <AdBanner data={AD_MY} />

          {posts.length > 0 && (
            <div className="my-section">
              <p className="my-section-label">流した瓶</p>
              {posts.map(p => (
                <div key={p.id} className={`log-card${p.dest==='ocean' ? ' ocean-dest' : ' fire-dest'}`}>
                  {editingId === p.id ? (
                    <>
                      <textarea
                        className="log-edit-area"
                        value={editText}
                        onChange={e => setEditText(e.target.value)}
                        maxLength={5000}
                      />
                      <div className="log-edit-btns">
                        <button className="log-cancel-btn" onClick={() => setEditingId(null)}>キャンセル</button>
                        <button className="log-save-btn" onClick={() => handleSaveEdit(p.id)}>保存する</button>
                      </div>
                    </>
                  ) : (
                    <>
                      <p className="log-text">{p.body || p.text}</p>
                      <div className="log-meta">
                        <span className={p.dest==='ocean' ? 'log-dest-ocean' : 'log-dest-fire'}>
                          {p.dest==='ocean' ? '海に流した' : '焚き火に流した'}
                        </span>
                        <span>{timeAgo(p.created_at)}</span>
                      </div>
                      <div className="log-actions">
                        <button className="log-action-btn edit" onClick={() => { setEditingId(p.id); setEditText(p.body || ''); setDeletingId(null); }}>編集</button>
                        <button className="log-action-btn del"  onClick={() => { setDeletingId(p.id); setEditingId(null); }}>削除</button>
                      </div>
                      {deletingId === p.id && (
                        <div className="log-del-confirm">
                          <span className="log-del-msg">本当に削除しますか？</span>
                          <div style={{ display:'flex', gap:'8px' }}>
                            <button className="log-cancel-btn" onClick={() => setDeletingId(null)}>いいえ</button>
                            <button className="log-del-yes" onClick={() => handleDelete(p.id)}>削除</button>
                          </div>
                        </div>
                      )}
                    </>
                  )}
                </div>
              ))}
            </div>
          )}

          <div className="my-section">
            <p className="my-section-label">このアプリについて</p>
            <div className="settings-list">
              <div className="settings-row">
                <span className="settings-key">SNS連携</span>
                <span className="no-badge">持たない</span>
              </div>
              <div className="settings-row">
                <span className="settings-key">ID検索</span>
                <span className="no-badge">持たない</span>
              </div>
              <div className="settings-row">
                <span className="settings-key">いいね / フォロワー数</span>
                <span className="no-badge">持たない</span>
              </div>
              <div className="settings-row">
                <span className="settings-key">引用 / 拡散機能</span>
                <span className="no-badge">持たない</span>
              </div>
              <div className="settings-row" style={{ cursor:'pointer' }} onClick={onSignOut}>
                <span className="settings-key" style={{ color:'#C04040' }}>ログアウト</span>
                <span className="settings-arrow">→</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── App ── */
    function App() {
      const [step,    setStep]    = useState('loading'); /* loading | splash | register | login | verify | app */
      const [session, setSession] = useState(null);
      const [tab,     setTab]     = useState('ocean');

      useEffect(() => {
        // 既存セッションを確認
        sb.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setStep(session ? 'app' : 'splash');
        });
        // 認証状態の変化を監視
        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          if (session) setStep('app');
        });
        return () => subscription.unsubscribe();
      }, []);

      async function handleSignOut() {
        await sb.auth.signOut();
        setSession(null);
        setTab('ocean');
        setStep('splash');
      }

      /* ─ 読込中 ─ */
      if (step === 'loading') {
        return (
          <div className="app-shell" style={{ alignItems:'center', justifyContent:'center', background:'linear-gradient(160deg,#D4F2E8 0%,#C4EAF8 32%,#D0F4F0 65%,#C8EEE0 100%)' }}>
            <span style={{ fontFamily:"'Noto Serif JP',serif", fontSize:'13px', color:'var(--ink-3)', letterSpacing:'.14em' }}>読み込み中…</span>
          </div>
        );
      }

      if (step === 'splash')
        return <div className="app-shell"><Splash onEnter={() => setStep('register')} /></div>;
      if (step === 'register')
        return <div className="app-shell"><Register onRegistered={() => setStep('verify')} onLogin={() => setStep('login')} /></div>;
      if (step === 'login')
        return <div className="app-shell"><Login onLoggedIn={() => {}} onBack={() => setStep('register')} /></div>;
      if (step === 'verify')
        return <div className="app-shell"><VerifyEmail email={session?.user?.email} onVerified={() => setStep('app')} /></div>;

      return (
        <div className="app-shell">
          <Sidebar current={tab} onChange={setTab} />
          <div className="content-wrap">
            {tab === 'write' ? (
              <Write session={session} onSent={dest => setTab(dest === '海' ? 'ocean' : 'bonfire')} />
            ) : (
              <div className="screen">
                {tab === 'ocean'    && <Ocean />}
                {tab === 'bonfire'  && <Bonfire session={session} />}
                {tab === 'naminoto' && <Naminoto />}
                {tab === 'my'       && <MyPage session={session} onSignOut={handleSignOut} />}
              </div>
            )}
            <NavBar current={tab} onChange={setTab} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
