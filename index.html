<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>さら砂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&family=Yusei+Magic&family=Zen+Maru+Gothic:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #F7F2EA;
      --surface:     #FDFAF5;
      --ocean:       #5A8FA8;
      --ocean-l:     #7AAAC4;
      --ocean-pale:  #E4EEF4;
      --ocean-mid:   #A8C8DC;
      --fire:        #B86838;
      --fire-pale:   #F2E8DF;
      --fire-mid:    #D4A070;
      --ink:         #28201A;
      --ink-2:       #483828;
      --ink-3:       #786858;
      --rule:        #DDD4C8;
      --sand:        #C0B4A4;
      --night:       #1A1008;
      --manu-bg:     #FBF8F2;
      --sepia:       rgba(100,80,60,.10);

      --shadow:      0 1px 3px rgba(0,0,0,.07);
      --shadow-lift: 0 2px 8px rgba(0,0,0,.10);
    }

    html, body {
      height: 100%; height: 100dvh;
      width: 100%; overflow: hidden;
      background: #E4DDD4;
    }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    body::before { display: none; }
    body::after  { display: none; }

    #root {
      height: 100%; height: 100dvh;
      display: flex; justify-content: center; align-items: center;
    }

    .app-shell {
      width: 100%; max-width: 390px;
      height: 100%; height: 100dvh; max-height: 844px;
      background: var(--bg);
      display: flex; flex-direction: column;
      overflow: hidden;
      border-left: 1px solid var(--rule);
      border-right: 1px solid var(--rule);
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }

    /* スクロール可能な通常スクリーン */
    .screen {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .screen::-webkit-scrollbar { display: none; }

    /* 書くスクリーン専用シェル（内部レイアウト制御） */
    .write-shell {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* ════════════════════════════════════
       SPLASH
    ════════════════════════════════════ */
    .splash {
      width: 100%; height: 100%;
      background: var(--surface);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .splash::before {
      content: '';
      position: absolute; inset: 20px;
      border: 1px solid var(--rule);
      pointer-events: none;
    }

    .splash-center { text-align: center; position: relative; z-index: 1; }

    .splash-logo {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 26px; font-weight: 400;
      letter-spacing: .6em; text-indent: .6em;
      color: var(--ink);
    }

    .splash-divider {
      display: flex; align-items: center; gap: 8px;
      margin: 24px auto; width: fit-content;
    }
    .splash-d-line { width: 28px; height: 1px; background: var(--rule); }
    .splash-d-dot  { width: 3px; height: 3px; border-radius: 50%; background: var(--sand); }

    .splash-tagline {
      font-family: 'Yusei Magic', sans-serif;
      font-size: 11px; font-weight: 300;
      color: var(--ink-3); letter-spacing: .14em; line-height: 2.2;
    }
    .splash-sub { font-size: 10px; color: var(--sand); margin-top: 4px; letter-spacing: .1em; }

    .enter-btn {
      margin-top: 44px;
      background: none;
      border: 1px solid var(--ink);
      border-radius: 0;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 11px; font-weight: 300;
      letter-spacing: .42em; text-indent: .42em;
      color: var(--ink); cursor: pointer;
      padding: 13px 38px;
      transition: background .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .enter-btn:hover { background: var(--ink); color: #fff; }

    .splash-features {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      margin-top: 28px;
    }
    .splash-pill {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 10px; font-weight: 400;
      color: var(--ink-3); letter-spacing: .06em;
      border: 1px solid var(--rule);
      padding: 5px 12px;
    }

    /* ════════════════════════════════════
       NAV
    ════════════════════════════════════ */
    .nav {
      display: flex; align-items: stretch;
      background: var(--surface);
      border-top: 1px solid var(--rule);
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; padding: 10px 0 14px;
      border: none; background: none; cursor: pointer;
      position: relative; transition: opacity .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item:not(.active) { opacity: .32; }
    .nav-item.active::after {
      content: '';
      position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--ocean);
    }
    .nav-item.fire-active::after { background: var(--fire); }
    .nav-icon {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 16px; font-weight: 500; line-height: 1;
    }
    .nav-label { font-size: 9px; letter-spacing: .08em; color: var(--ink-3); }
    .nav-item.active .nav-label { color: var(--ocean); }
    .nav-item.fire-active .nav-label { color: var(--fire); }

    /* ════════════════════════════════════
       SHARED
    ════════════════════════════════════ */
    .screen-title {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 18px; font-weight: 500;
      letter-spacing: .08em; color: var(--ink);
    }
    .screen-sub { font-size: 10px; color: var(--ink-3); margin-top: 4px; letter-spacing: .1em; }

    /* ════════════════════════════════════
       OCEAN — 海
    ════════════════════════════════════ */
    .ocean-screen { min-height: 100%; background: var(--bg); padding-bottom: 48px; }

    .ocean-header {
      padding: 18px 18px 0;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .ocean-header::after { display: none; }
    .ocean-header-top { padding-bottom: 14px; }

    .ocean-tabs { display: flex; gap: 0; }
    .ocean-tab {
      padding: 8px 14px 10px; border: none; background: none; cursor: pointer;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 11px; font-weight: 300; letter-spacing: .1em; color: var(--ink-3);
      position: relative; transition: color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .ocean-tab.active { color: var(--ocean); }
    .ocean-tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 10px; right: 10px;
      height: 1px;
      background: var(--ocean);
    }

    /* ════════════════════════════════════
       LETTER CARDS — 漂着したメッセージ
    ════════════════════════════════════ */
    .letter-list { padding: 16px 14px 0; display: flex; flex-direction: column; gap: 10px; }

    .letter-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 0;
      box-shadow: var(--shadow);
      padding: 20px 18px 16px;
      position: relative; overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* 漂着バリアント — 小さな傾き */
    .letter-card[data-v="0"] { transform: rotate(-0.3deg); }
    .letter-card[data-v="1"] { transform: rotate(0.4deg); }
    .letter-card[data-v="2"] { transform: rotate(-0.25deg); }
    .letter-card[data-v="3"] { transform: rotate(0.3deg); }
    .letter-card[data-v="4"] { transform: rotate(-0.35deg); }

    .letter-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: var(--ocean-pale);
    }
    .letter-card::after { display: none; }

    @keyframes waveRecede {
      0%   { opacity: 1; }
      30%  { opacity: .5; }
      100% { opacity: 1; }
    }
    .letter-card.receding { animation: waveRecede .5s ease both; }

    .letter-from { font-size: 11px; letter-spacing: .14em; color: var(--ink-3); margin-bottom: 12px; }
    .letter-body {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 15px; font-weight: 400; line-height: 2.0; color: var(--ink);
      letter-spacing: .03em;
      white-space: pre-wrap; word-break: break-word;
    }
    .letter-foot {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; padding-top: 11px;
      border-top: 1px solid var(--rule);
    }
    .letter-time { font-size: 10px; color: var(--ink-3); }

    .wave-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: 1px solid transparent; cursor: pointer;
      padding: 2px 8px 2px 6px;
      font-size: 11px; color: var(--ocean-l); letter-spacing: .06em;
      transition: border-color .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .wave-btn:hover { border-color: var(--ocean-pale); }
    .wave-btn.waved { color: var(--ocean); border-color: var(--ocean-mid); }

    /* ════════════════════════════════════
       AD CARD — 広告（インフィード）
    ════════════════════════════════════ */
    .ad-card {
      background: var(--bg);
      border: 1px dashed var(--rule);
      border-radius: 0;
      overflow: hidden;
      position: relative;
      margin: 0;
    }

    .ad-promo-label {
      position: absolute; top: 8px; right: 10px;
      font-size: 8px; letter-spacing: .16em; text-transform: uppercase;
      color: var(--sand); font-weight: 300;
    }

    .ad-visual {
      width: 100%; height: 56px;
      filter: grayscale(40%) sepia(20%);
    }

    .ad-body { padding: 12px 16px 14px; }

    .ad-copy {
      font-family: 'Yusei Magic', sans-serif;
      font-size: 13px; color: var(--ink-2);
      letter-spacing: .08em; line-height: 1.9;
    }

    .ad-brand { font-size: 10px; color: var(--ink-3); margin-top: 6px; letter-spacing: .12em; }

    /* ── 横長バナー広告 ── */
    .ad-banner {
      margin: 12px 14px 0;
      background: var(--bg);
      border: 1px dashed var(--rule);
      border-radius: 0;
      overflow: hidden; position: relative;
      display: flex; align-items: stretch;
    }
    .ad-banner-visual {
      width: 56px; flex-shrink: 0;
    }
    .ad-banner-body {
      flex: 1; padding: 10px 12px 10px;
    }
    .ad-banner-copy {
      font-family: 'Yusei Magic', sans-serif;
      font-size: 11px; color: var(--ink-2);
      letter-spacing: .06em; line-height: 1.7;
    }
    .ad-banner-brand {
      font-size: 9px; color: var(--ink-3);
      margin-top: 4px; letter-spacing: .12em;
    }
    .ad-banner-promo {
      position: absolute; top: 6px; right: 8px;
      font-size: 8px; letter-spacing: .14em;
      color: var(--sand); font-weight: 300;
    }
    @media (min-width: 1024px) {
      .ad-banner {
        max-width: 680px;
        margin-left: auto; margin-right: auto;
        width: auto;
      }
    }

    /* ════════════════════════════════════
       NOVEL CARDS — 日記小説
    ════════════════════════════════════ */
    .novel-list { padding: 16px 14px 0; display: flex; flex-direction: column; gap: 10px; }

    .novel-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 0;
      box-shadow: var(--shadow); overflow: hidden; position: relative;
    }
    .novel-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--ocean-pale);
      border-bottom: 1px dashed var(--ocean-mid);
    }
    .novel-body { padding: 18px 18px 0; }
    .novel-title {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 16px; font-weight: 500; color: var(--ink); letter-spacing: .04em; line-height: 1.7;
    }
    .novel-excerpt {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 14px; font-weight: 400; color: var(--ink-2); line-height: 2.0; margin-top: 12px;
      letter-spacing: .03em;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }
    .novel-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 13px; margin-top: 10px; border-top: 1px solid var(--rule);
    }
    .novel-from { font-size: 10px; color: var(--ink-3); letter-spacing: .12em; }
    .novel-time { font-size: 10px; color: var(--ink-3); margin-top: 2px; }
    .novel-read { font-size: 10px; color: var(--ocean); letter-spacing: .1em; font-family: 'Yusei Magic', sans-serif; }

    /* ════════════════════════════════════
       BONFIRE — 焚き火
    ════════════════════════════════════ */
    .bonfire-screen { min-height: 100%; background: var(--bg); padding-bottom: 48px; }
    .bonfire-header {
      padding: 18px 18px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .bonfire-header::after { display: none; }
    .bonfire-header .screen-title { color: var(--ink); }
    .bonfire-header .screen-sub   { color: var(--ink-3); }

    .room-card {
      margin: 12px 14px 0;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 0; overflow: hidden;
    }
    .room-head {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      border-bottom: 1px solid var(--rule);
      background: var(--fire-pale);
    }
    .room-name {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 14px; font-weight: 500; color: var(--ink); letter-spacing: .06em;
    }
    .room-meta { font-size: 10px; color: var(--ink-3); margin-top: 2px; letter-spacing: .06em; }
    .post-card { padding: 14px 16px 12px; border-bottom: 1px solid var(--rule); position: relative; }
    .post-card:last-child { border-bottom: none; }
    .post-card::before {
      content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 2px;
      background: var(--fire);
    }
    .post-from { font-size: 10px; letter-spacing: .12em; color: var(--ink-3); margin-bottom: 10px; padding-left: 8px; }
    .post-body {
      font-family: 'Yusei Magic', sans-serif; font-size: 14px; font-weight: 300;
      line-height: 2.1; color: var(--ink-2); padding-left: 8px;
    }
    .post-foot {
      margin-top: 8px; padding: 8px 0 0 8px;
      display: flex; justify-content: space-between; border-top: 1px solid var(--rule);
    }
    .post-time { font-size: 10px; color: var(--ink-3); }
    .post-wave { font-size: 11px; color: var(--fire); }

    /* ════════════════════════════════════
       BONFIRE — チャット・コミュニティ作成
    ════════════════════════════════════ */

    .chat-shell {
      display: flex; flex-direction: column;
      height: 100%; background: var(--bg);
    }
    .chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0; position: relative; z-index: 1;
    }
    .chat-header::after { display: none; }
    .chat-back {
      background: none; border: none; cursor: pointer;
      font-size: 16px; line-height: 1; color: var(--fire);
      padding: 4px 8px 4px 2px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .2s; flex-shrink: 0;
    }
    .chat-back:hover { opacity: .6; }
    .chat-room-info { flex: 1; }
    .chat-room-name {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 14px; font-weight: 500; color: var(--ink); letter-spacing: .06em;
    }
    .chat-room-meta { font-size: 10px; color: var(--ink-3); margin-top: 2px; }

    .chat-messages {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 14px 12px 10px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
      background: var(--bg);
    }
    .chat-messages::-webkit-scrollbar { display: none; }

    .chat-msg { display: flex; flex-direction: column; max-width: 80%; }
    .chat-msg.me    { align-self: flex-end;   align-items: flex-end;   }
    .chat-msg.other { align-self: flex-start; align-items: flex-start; }

    .chat-msg-handle {
      font-size: 10px; color: var(--ink-3); letter-spacing: .08em;
      margin-bottom: 4px; padding: 0 4px;
    }
    .chat-msg-bubble {
      padding: 10px 14px; border-radius: 0;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 13px; font-weight: 300; line-height: 1.9;
      word-break: break-all;
    }
    .chat-msg.other .chat-msg-bubble {
      background: var(--surface);
      border: 1px solid var(--rule);
      color: var(--ink);
    }
    .chat-msg.me .chat-msg-bubble {
      background: var(--fire-pale);
      border: 1px solid var(--fire-mid);
      color: var(--ink);
    }
    .chat-msg-time {
      font-size: 9px; color: var(--sand); margin-top: 4px; padding: 0 4px;
    }

    .chat-input-area {
      flex-shrink: 0;
      display: flex; align-items: flex-end; gap: 8px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      background: var(--surface);
      border-top: 1px solid var(--rule);
    }
    .chat-textarea {
      flex: 1; resize: none; border: none; outline: none;
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 0;
      padding: 10px 12px;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 13px; font-weight: 300; color: var(--ink); line-height: 1.7;
      max-height: 100px; overflow-y: auto;
      caret-color: var(--fire);
      -webkit-overflow-scrolling: touch;
    }
    .chat-textarea::placeholder { color: var(--sand); }
    .chat-send-btn {
      width: 38px; height: 38px; flex-shrink: 0;
      border-radius: 0; border: 1px solid var(--fire); cursor: pointer;
      background: var(--fire);
      color: #fff; font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .chat-send-btn:disabled { opacity: .25; cursor: default; }
    .chat-send-btn:not(:disabled):hover { background: #A05A30; }

    .room-create-card {
      margin: 12px 14px 0;
      background: none;
      border: 1px dashed var(--fire-mid);
      border-radius: 0;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; font-size: 13px; color: var(--fire);
      font-family: 'Yusei Magic', sans-serif; letter-spacing: .08em;
      transition: background .2s; -webkit-tap-highlight-color: transparent;
    }
    .room-create-card:hover { background: var(--fire-pale); }

    .create-shell {
      display: flex; flex-direction: column;
      height: 100%; background: var(--bg);
    }
    .create-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .create-title-text {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 14px; font-weight: 500; color: var(--ink); letter-spacing: .06em;
    }
    .create-body {
      flex: 1; overflow-y: auto; padding: 24px 16px 40px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .create-body::-webkit-scrollbar { display: none; }
    .create-label {
      font-size: 9px; letter-spacing: .2em; color: var(--ink-3);
      text-transform: uppercase; margin-bottom: 10px; margin-top: 22px;
    }
    .create-label:first-child { margin-top: 0; }
    .create-input {
      width: 100%;
      border: 1px solid var(--rule);
      border-radius: 0; outline: none;
      background: var(--surface);
      padding: 12px 14px;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 14px; font-weight: 300; color: var(--ink);
      caret-color: var(--fire); letter-spacing: .04em;
    }
    .create-input::placeholder { color: var(--sand); }
    .create-input:focus { border-color: var(--fire); }
    .create-submit-btn {
      margin-top: 26px; width: 100%;
      padding: 14px 0; border: 1px solid var(--fire); cursor: pointer;
      border-radius: 0;
      background: var(--fire);
      color: #fff; font-family: 'Yusei Magic', sans-serif;
      font-size: 13px; font-weight: 300; letter-spacing: .16em;
      transition: background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .create-submit-btn:disabled { opacity: .3; cursor: default; }
    .create-submit-btn:not(:disabled):hover { background: #A05A30; }

    .bonfire-screen .ad-card { background: var(--surface); border-color: var(--rule); }
    .bonfire-screen .ad-copy  { color: var(--ink-2); }
    .bonfire-screen .ad-brand { color: var(--ink-3); }
    .bonfire-screen .ad-promo-label { color: var(--ink-3); }

    @media (min-width: 1024px) {
      .chat-header, .chat-messages, .chat-input-area,
      .create-header, .create-body {
        max-width: 680px; margin-left: auto; margin-right: auto;
        width: 100%; box-sizing: border-box;
      }
      .chat-shell, .create-shell { background: #140C04; }
    }

    /* ════════════════════════════════════
       WRITE — 書く
    ════════════════════════════════════ */
    .write-header {
      background: var(--surface); border-bottom: 1px solid var(--rule);
      flex-shrink: 0; padding: 18px 18px 0;
    }
    .write-header-top { padding-bottom: 12px; }

    .write-mode-tabs { display: flex; }
    .write-mode-tab {
      padding: 8px 16px 10px; border: none; background: none; cursor: pointer;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 11px; letter-spacing: .1em; color: var(--ink-3);
      position: relative; transition: color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .write-mode-tab.active { color: var(--ink); }
    .write-mode-tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 8px; right: 8px;
      height: 1px;
      background: var(--ink);
    }

    .write-body {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 16px 14px;
      scrollbar-width: none;
    }
    .write-body::-webkit-scrollbar { display: none; }

    .write-paper {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 0;
      overflow: hidden; position: relative;
    }
    .write-paper::before {
      content: ''; position: absolute;
      top: 0; left: 42px; bottom: 0; width: 1px;
      background: rgba(180,100,50,.12); pointer-events: none; z-index: 1;
    }
    .write-area {
      width: 100%; min-height: 260px;
      background: transparent; border: none;
      padding: 20px 18px 20px 54px;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 15px; font-weight: 300; line-height: 2.2; color: var(--ink);
      resize: none; outline: none; caret-color: var(--ocean);
      background-image: repeating-linear-gradient(
        transparent, transparent calc(2.2em - 1px),
        rgba(0,0,0,.04) calc(2.2em - 1px), rgba(0,0,0,.04) 2.2em
      );
      background-attachment: local;
    }
    .write-area::placeholder { color: var(--sand); }
    .write-count {
      display: flex; justify-content: flex-end;
      padding: 7px 16px 10px; font-size: 10px; color: var(--ink-3);
      border-top: 1px solid var(--rule);
    }

    .manuscript-paper {
      background: var(--manu-bg);
      border: 1px solid var(--rule);
      border-radius: 0;
      overflow: hidden;
    }

    .manuscript-title {
      width: 100%; border: none; outline: none;
      background: transparent;
      border-bottom: 1px solid var(--sepia);
      padding: 16px 18px 14px;
      font-family: 'RocknRoll One', sans-serif;
      font-size: 16px; font-weight: 500;
      color: var(--ink); letter-spacing: .06em;
      caret-color: var(--ocean);
    }
    .manuscript-title::placeholder { color: var(--sand); font-weight: 400; }

    .novel-area {
      width: 100%; min-height: 360px;
      border: none; outline: none; resize: none;
      background-color: var(--manu-bg);
      background-image: repeating-linear-gradient(
        transparent 0,
        transparent calc(2.8em - 1px),
        var(--sepia) calc(2.8em - 1px),
        var(--sepia) 2.8em
      );
      background-attachment: local;
      padding: 1.4em 18px 18px;
      font-family: 'RocknRoll One', sans-serif;
      font-size: 16px; line-height: 2.8em;
      color: var(--ink); letter-spacing: .08em;
      caret-color: var(--ocean);
      -webkit-overflow-scrolling: touch;
    }
    .novel-area::placeholder { color: var(--sand); }

    .novel-count {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 18px 12px;
      background: var(--manu-bg);
      border-top: 1px solid var(--sepia);
      font-size: 10px; color: var(--ink-3); letter-spacing: .1em;
    }

    .autosave-indicator {
      opacity: 0; transition: opacity .4s;
      font-size: 10px; color: var(--ink-3); letter-spacing: .1em;
    }
    .autosave-indicator.on { opacity: 1; }

    .send-area {
      flex-shrink: 0;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px));
      background: var(--surface);
      border-top: 1px solid var(--rule);
    }
    .send-label {
      font-size: 9px; letter-spacing: .2em; color: var(--ink-3);
      text-align: center; margin-bottom: 10px;
    }
    .send-btns { display: flex; gap: 8px; }
    .send-btn {
      flex: 1; padding: 12px 8px;
      background: var(--bg); border: 1px solid var(--rule); border-radius: 0;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 12px; font-weight: 300; letter-spacing: .1em; color: var(--ink-2);
      cursor: pointer; transition: background .2s;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn::before { display: none; }
    .send-btn-icon { font-size: 16px; }
    .send-btn.ocean { border-left: 2px solid var(--ocean); }
    .send-btn.fire  { border-left: 2px solid var(--fire); }
    .send-btn:hover:not(:disabled) { background: var(--surface); }
    .send-btn:disabled { opacity: .28; cursor: default; }

    .sent-view {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 40px 32px; text-align: center;
    }
    .sent-icon { font-size: 40px; }
    .sent-title {
      font-family: 'Yusei Magic', sans-serif; font-size: 14px; font-weight: 300;
      color: var(--ink); line-height: 2.4; white-space: pre-line;
    }
    .sent-note { font-size: 10px; color: var(--ink-3); letter-spacing: .12em; }

    /* ════════════════════════════════════
       NAMINOTO — 波音（儚さ演出）
    ════════════════════════════════════ */
    .naminoto-screen { min-height: 100%; background: var(--bg); padding-bottom: 48px; }
    .naminoto-header {
      padding: 18px 18px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .naminoto-header::after { display: none; }
    .wave-count-card {
      margin: 14px 14px 18px; background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 0;
      padding: 28px 22px 24px; text-align: center; position: relative; overflow: hidden;
    }
    .wave-count-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: var(--ocean-pale);
    }
    .wave-big {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 68px; font-weight: 400; color: var(--ocean);
      line-height: 1; letter-spacing: -.02em;
    }
    .wave-label { font-size: 10px; color: var(--ink-3); margin-top: 10px; letter-spacing: .18em; }
    .wave-detail { font-size: 11px; color: var(--ink-2); margin-top: 12px; line-height: 2; }
    .wave-expire {
      display: inline-block; margin-top: 10px; padding: 3px 10px;
      background: var(--ocean-pale); border: 1px dashed var(--ocean-mid);
      font-size: 10px; color: var(--ink-3); letter-spacing: .08em;
    }
    .wave-section { font-size: 9px; letter-spacing: .2em; color: var(--ink-3); padding: 0 14px 8px; }
    .wave-list { display: flex; flex-direction: column; gap: 0; padding: 0 14px; }

    .wave-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--surface);
      border: 1px solid var(--rule); border-bottom: none;
      opacity: .55;
      transition: opacity .25s;
    }
    .wave-item:last-child { border-bottom: 1px solid var(--rule); }
    .wave-item.sunatomo { opacity: .85; }
    .wave-item:hover { opacity: 1; }

    .wave-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--ocean-pale); font-size: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--rule);
    }
    .wave-avatar.unknown {
      background: var(--bg); border-color: var(--rule);
      font-size: 10px; color: var(--ink-3);
    }
    .wave-info { flex: 1; }
    .wave-name { font-size: 13px; color: var(--ink); letter-spacing: .04em; }
    .wave-note { font-size: 10px; color: var(--ink-3); margin-top: 2px; }
    .wave-time { font-size: 10px; color: var(--ink-3); }
    .wave-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ocean); flex-shrink: 0; }
    .naminoto-note {
      font-family: 'Yusei Magic', sans-serif;
      font-size: 11px; font-weight: 300; color: var(--ink-3); text-align: center;
      margin-top: 24px; line-height: 2.4; letter-spacing: .08em; padding: 0 28px;
    }

    /* ════════════════════════════════════
       MY PAGE
    ════════════════════════════════════ */
    .my-screen { min-height: 100%; background: var(--bg); padding-bottom: 48px; }
    .my-head {
      background: var(--surface); padding: 32px 22px 24px;
      border-bottom: 1px solid var(--rule);
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .my-av {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--ocean-pale);
      border: 1px solid var(--rule);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 14px;
    }
    .my-name {
      font-family: 'RocknRoll One', sans-serif; font-size: 18px; font-weight: 500;
      color: var(--ink); letter-spacing: .1em;
    }
    .my-since { font-size: 10px; color: var(--ink-3); margin-top: 5px; letter-spacing: .1em; }
    .my-edit-btn {
      margin-top: 12px;
      padding: 5px 18px;
      background: none; border: 1px solid var(--rule); border-radius: 0;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 10px; color: var(--ink-3); letter-spacing: .12em; cursor: pointer;
      transition: border-color .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .my-edit-btn:hover { border-color: var(--ink-3); color: var(--ink-2); }

    .my-stats { display: flex; background: var(--surface); border-bottom: 1px solid var(--rule); }
    .stat { flex: 1; padding: 18px 6px; text-align: center; }
    .stat + .stat { border-left: 1px solid var(--rule); }
    .stat-n {
      font-family: 'RocknRoll One', sans-serif; font-size: 24px; font-weight: 400; color: var(--ink);
    }
    .stat-l { font-size: 10px; color: var(--ink-3); margin-top: 4px; letter-spacing: .07em; }

    .my-section { padding: 18px 14px 0; }
    .my-section-label {
      font-size: 9px; letter-spacing: .22em; color: var(--ink-3);
      margin-bottom: 12px;
    }
    .log-card {
      background: var(--surface);
      border: 1px solid var(--rule); border-left: 2px solid var(--rule);
      padding: 12px 14px 10px; margin-bottom: 8px;
      border-radius: 0;
    }
    .log-card.ocean-dest { border-left-color: var(--ocean); }
    .log-card.fire-dest  { border-left-color: var(--fire); }
    .log-text {
      font-family: 'Yusei Magic', sans-serif; font-size: 13px; font-weight: 300;
      line-height: 2; color: var(--ink-2);
    }
    .log-meta {
      display: flex; justify-content: space-between;
      margin-top: 8px; font-size: 10px; color: var(--ink-3); letter-spacing: .05em;
    }
    .log-dest-ocean { color: var(--ocean); }
    .log-dest-fire  { color: var(--fire); }

    .log-actions {
      display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end;
    }
    .log-action-btn {
      background: none; border: none; cursor: pointer;
      font-size: 10px; letter-spacing: .1em; padding: 3px 10px;
      transition: background .18s;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Yusei Magic', sans-serif;
    }
    .log-action-btn.edit   { color: var(--ocean); }
    .log-action-btn.edit:hover   { background: var(--ocean-pale); }
    .log-action-btn.del    { color: #A83838; }
    .log-action-btn.del:hover    { background: rgba(168,56,56,.07); }
    .log-edit-area {
      width: 100%; min-height: 90px; resize: vertical;
      border: 1px solid var(--rule); border-radius: 0;
      padding: 10px 12px; margin-top: 8px;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 13px; font-weight: 300; color: var(--ink);
      background: var(--surface); outline: none;
      caret-color: var(--ocean); line-height: 1.9;
    }
    .log-edit-btns { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
    .log-save-btn {
      padding: 5px 16px; border-radius: 0; cursor: pointer;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 11px; letter-spacing: .1em; color: var(--ink-2);
      background: var(--ocean-pale);
      border: 1px solid var(--rule);
      -webkit-tap-highlight-color: transparent;
    }
    .log-cancel-btn {
      padding: 5px 12px; border-radius: 0; cursor: pointer;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 11px; letter-spacing: .08em; color: var(--ink-3);
      background: none; border: none;
      -webkit-tap-highlight-color: transparent;
    }
    .log-del-confirm {
      margin-top: 8px; padding: 10px 12px;
      background: rgba(168,56,56,.04); border: 1px dashed rgba(168,56,56,.22);
      display: flex; align-items: center; justify-content: space-between;
    }
    .log-del-msg { font-size: 11px; color: #A83838; letter-spacing: .06em; }
    .log-del-yes {
      padding: 4px 14px; border-radius: 0; cursor: pointer;
      font-size: 11px; color: #fff; background: #A83838; border: none;
      font-family: 'Yusei Magic', sans-serif; letter-spacing: .08em;
      -webkit-tap-highlight-color: transparent;
    }

    /* 設定 */
    .settings-list {
      border: 1px solid var(--rule); overflow: hidden;
    }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); padding: 14px 16px;
      border-bottom: 1px solid var(--rule);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-key { font-size: 13px; color: var(--ink-2); letter-spacing: .03em; }
    .no-badge {
      font-size: 8px; letter-spacing: .14em;
      padding: 3px 8px; border: 1px solid var(--rule);
      background: var(--bg); color: var(--ink-3);
    }
    .settings-arrow { font-size: 12px; color: var(--ink-3); }

    /* ════════════════════════════════════
       SIDEBAR（デスクトップ用）
    ════════════════════════════════════ */
    .sidebar {
      display: none;
      flex-direction: column;
      width: 210px; min-width: 210px;
      background: var(--surface);
      border-right: 1px solid var(--rule);
      overflow: hidden; position: relative; flex-shrink: 0;
    }
    .sidebar::before { display: none; }

    .sidebar-logo-area {
      padding: 36px 22px 22px;
      position: relative; z-index: 1;
      border-bottom: 1px solid var(--rule);
    }
    .sidebar-logo-ja {
      display: block;
      font-family: 'RocknRoll One', sans-serif;
      font-size: 17px; font-weight: 500; letter-spacing: .52em;
      color: var(--ink);
    }
    .sidebar-tagline {
      font-family: 'Yusei Magic', sans-serif;
      font-size: 10px; font-weight: 300;
      color: var(--ink-3); margin-top: 12px; line-height: 2.2; letter-spacing: .06em;
    }

    .sidebar-nav {
      flex: 1; padding: 14px 10px;
      display: flex; flex-direction: column; gap: 2px;
      position: relative; z-index: 1;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border: none; background: none;
      cursor: pointer; border-radius: 0; width: 100%; text-align: left;
      transition: background .18s; -webkit-tap-highlight-color: transparent;
    }
    .sidebar-item:hover   { background: var(--bg); }
    .sidebar-item.active  { background: var(--ocean-pale); border-left: 2px solid var(--ocean); }

    .sidebar-icon  {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 15px; font-weight: 500;
      flex-shrink: 0; line-height: 1;
      width: 20px; text-align: center;
    }
    .sidebar-label { font-size: 13px; letter-spacing: .06em; color: var(--ink-2); font-weight: 300; }
    .sidebar-item.active  .sidebar-label { color: var(--ink); font-weight: 500; }
    .sidebar-item.fire-active.active { background: var(--fire-pale); border-left-color: var(--fire); }

    .sidebar-divider {
      height: 1px; margin: 6px 14px;
      background: var(--rule);
    }

    .sidebar-footer {
      padding: 16px 22px 30px; position: relative; z-index: 1;
      border-top: 1px solid var(--rule);
    }
    .sidebar-footer p {
      font-family: 'Yusei Magic', sans-serif;
      font-size: 10px; font-weight: 300;
      color: var(--ink-3); letter-spacing: .1em; line-height: 2.2;
    }

    /* ════════════════════════════════════
       CONTENT WRAP
    ════════════════════════════════════ */
    .content-wrap {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ════════════════════════════════════
       DESKTOP ≥ 768px
    ════════════════════════════════════ */
    @media (min-width: 1024px) {
      html, body { background: #E4DDD4; }

      #root { align-items: stretch; }

      .app-shell {
        max-width: 100%; max-height: 100%;
        height: 100vh; height: 100dvh;
        flex-direction: row;
        box-shadow: none; border-radius: 0;
        background: var(--bg);
      }

      .sidebar { display: flex; }
      .nav { display: none !important; }

      /* コンテンツを中央寄せ（max 680px） */
      .ocean-header, .bonfire-header, .naminoto-header, .my-head, .my-stats {
        max-width: 680px; margin-left: auto; margin-right: auto;
        width: 100%; box-sizing: border-box;
      }
      .letter-list, .novel-list, .bonfire-posts,
      .wave-count-card, .wave-section, .wave-list, .naminoto-note,
      .my-section, .room-card {
        max-width: 680px; margin-left: auto; margin-right: auto;
        width: 100%;
      }
      .room-card { width: auto; }

      /* デスクトップではカードを傾けない */
      .letter-card[data-v="0"],
      .letter-card[data-v="1"],
      .letter-card[data-v="2"],
      .letter-card[data-v="3"],
      .letter-card[data-v="4"] {
        transform: none; margin: 0;
      }

      /* カード余白を少し広げる */
      .letter-card { padding: 26px 24px 20px; }

      /* 書くスクリーン */
      .write-header, .write-body, .send-area {
        max-width: 640px; margin-left: auto; margin-right: auto;
        width: 100%; box-sizing: border-box;
      }

      /* タイトルを少し大きく */
      .screen-title { font-size: 22px; }

      /* マイページ stats横幅 */
      .my-stats { display: flex; }

      /* wave-count-card は margin 調整 */
      .wave-count-card { width: auto; }
    }

    /* ════════════════════════════════════
       BOOKMARK BUTTON（しおり・付箋）
    ════════════════════════════════════ */
    .bm-btn {
      background: none; border: none; padding: 4px;
      cursor: pointer; display: inline-flex; align-items: center;
      color: var(--ink-3);
      transition: color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .bm-btn:hover { color: var(--ink); }
    .bm-btn.active { color: var(--fire); }
    .bm-btn svg { display: block; }

    /* ════════════════════════════════════
       USER NOTEBOOK（○○からの便り）
    ════════════════════════════════════ */
    .notebook-screen { background: var(--bg); }
    .notebook-header {
      padding: 32px 22px 20px;
      border-bottom: 1px solid var(--rule);
      background: var(--surface);
      position: relative;
    }
    .notebook-back {
      position: absolute; top: 14px; left: 14px;
      background: none; border: none;
      font-family: 'Yusei Magic', sans-serif;
      font-size: 11px; color: var(--ink-3);
      cursor: pointer; padding: 6px 10px;
      letter-spacing: .12em;
      -webkit-tap-highlight-color: transparent;
    }
    .notebook-title {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 18px; font-weight: 400;
      color: var(--ink); text-align: center;
      letter-spacing: .14em;
    }
    .notebook-section-label {
      font-family: 'RocknRoll One', sans-serif;
      font-size: 11px; color: var(--ink-3);
      letter-spacing: .28em;
      padding: 24px 22px 10px;
      border-bottom: 1px solid var(--rule);
      background: var(--surface);
    }
    .notebook-empty {
      text-align: center; padding: 32px 24px; color: var(--ink-3);
      font-family: 'Yusei Magic', sans-serif;
      font-size: 12px; letter-spacing: .08em; line-height: 2;
    }
    .letter-from-btn {
      background: none; border: none; padding: 0;
      font: inherit; color: inherit; cursor: pointer;
      letter-spacing: inherit;
      border-bottom: 1px dashed var(--rule);
      -webkit-tap-highlight-color: transparent;
    }
    .letter-from-btn:hover { color: var(--ocean); }

    /* ════════════════════════════════════
       SMALL SCREEN ≤ 360px（iPhone SE等）
    ════════════════════════════════════ */
    @media (max-width: 360px) {
      .splash-logo { font-size: 22px; letter-spacing: .5em; text-indent: .5em; }
      .splash-tagline { font-size: 10px; line-height: 2; }
      .splash-pill { font-size: 9px; padding: 4px 9px; }
      .enter-btn { padding: 11px 28px; font-size: 10px; letter-spacing: .35em; text-indent: .35em; }
      .register-scroll { padding: 30px 22px 40px; }
      .form-input, .form-select { font-size: 13px; }
    }

            // 【タイトル】で始まるものを日記小説、それ以外をショート日記に分類
            setDbPosts(all.filter(p => !(p.body || '').startsWith('【')));
            setDbNovels(all.filter(p => (p.body || '').startsWith('【')));
          });
      }, []);

      function handleTap(id) {
        setReceding(id);
        setTimeout(() => setReceding(null), 700);
      }

      // DBのデータのみ表示（フォールバック無効）
      const shortItems = dbPosts  || [];
      const novelItems = dbNovels || [];

      function buildTimeline() {
        const nodes = [];
        shortItems.forEach((item, i) => {
          nodes.push(
            <LetterCard key={item.id} data={item} index={i} receding={recedingId === item.id} onTap={handleTap} session={session} onHandleClick={onHandleClick} bookmarked={bookmarks?.[item.id] === 'fusen'} onToggleBookmark={onToggleBookmark} />
          );
          const adKey = i + 1;
          if (ADS[adKey]) nodes.push(<AdCard key={ADS[adKey].id} data={ADS[adKey]} />);
        });
        return nodes;
      }

      return (
        <div className="screen ocean-screen">
          <div className="ocean-header">
            <div className="ocean-header-top">
              <div className="screen-title">海</div>
              <div className="screen-sub">漂着したメッセージ</div>
            </div>
            <div className="ocean-tabs">
              <button className={`ocean-tab${tab==='short'?' active':''}`} onClick={() => setTab('short')}>ショート日記</button>
              <button className={`ocean-tab${tab==='novel'?' active':''}`} onClick={() => setTab('novel')}>日記小説</button>
            </div>
          </div>

          {tab === 'short' && (
            dbPosts === null ? (
              <p style={{ textAlign:'center', padding:'40px 20px', color:'var(--ink-3)', fontSize:'12px', letterSpacing:'.1em', fontFamily:"'Noto Serif JP',serif" }}>読み込み中…</p>
            ) : shortItems.length === 0 ? (
              <div style={{ textAlign:'center', padding:'60px 24px', color:'var(--ink-3)', fontFamily:"'Noto Serif JP',serif" }}>
                <div style={{ fontSize:'32px', marginBottom:'20px', opacity:0.4 }}>🌊</div>
                <p style={{ fontSize:'14px', lineHeight:2.4, letterSpacing:'.1em' }}>
                  砂浜は静かです。<br />あなたの言葉を待っています。
                </p>
              </div>
            ) : (
              <div className="letter-list">{buildTimeline()}</div>
            )
          )}

          {tab === 'novel' && (
            dbNovels === null ? (
              <p style={{ textAlign:'center', padding:'40px 20px', color:'var(--ink-3)', fontSize:'12px', letterSpacing:'.1em', fontFamily:"'Noto Serif JP',serif" }}>読み込み中…</p>
            ) : novelItems.length === 0 ? (
              <div style={{ textAlign:'center', padding:'60px 24px', color:'var(--ink-3)', fontFamily:"'Noto Serif JP',serif" }}>
                <div style={{ fontSize:'32px', marginBottom:'20px', opacity:0.4 }}>🌊</div>
                <p style={{ fontSize:'14px', lineHeight:2.4, letterSpacing:'.1em' }}>
                  砂浜は静かです。<br />あなたの言葉を待っています。
                </p>
              </div>
            ) : (
              <div className="novel-list">
                {novelItems.map(n => (
                  <div key={n.id} className="novel-card">
                    <div className="novel-body">
                      {(() => {
                        const raw = n.body || n.text || '';
                        const m = raw.match(/^【(.+?)】\n?([\s\S]*)/);
                        return <>
                          <div className="novel-title">{m ? m[1] : (n.title || raw.slice(0,30))}</div>
                          <p className="novel-excerpt">{n.excerpt || (m ? m[2] : raw)}</p>
                        </>;
                      })()}
                    </div>
                    <div className="novel-foot">
                      <div>
                        <div className="novel-from">
                          {onHandleClick ? (
                            <button className="letter-from-btn" onClick={() => onHandleClick(n.handle)}>{n.handle}</button>
                          ) : n.handle}
                        </div>
                        <div className="novel-time">{n.time || timeAgo(n.created_at)}</div>
                      </div>
                      <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
                        {onToggleBookmark && (
                          <BookmarkButton active={bookmarks?.[n.id] === 'shiori'} kind="shiori" onClick={() => onToggleBookmark(n.id, 'shiori')} />
                        )}
                        <span className="novel-read">続きを読む →</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )
          )}
        </div>
      );
    }

    /* ── Bonfire ── */
    function Bonfire({ session }) {
      const [view,        setView]       = useState('list');
      const [rooms,       setRooms]      = useState(null); // null = 読込中
      const [activeRoom,  setActiveRoom] = useState(null);
      const [messages,    setMessages]   = useState([]);
      const [newMsg,      setNewMsg]     = useState('');
      const [newName,     setNewName]    = useState('');
      const [filterErr,   setFilterErr]  = useState(null);
      const [sending,     setSending]    = useState(false);
      const [deletingRoom, setDeletingRoom] = useState(null);
      const [creating,     setCreating]     = useState(false);
      const messagesEndRef = useRef(null);

      /* ルーム一覧を読み込む */
      useEffect(() => {
        sb.from('rooms').select('*').order('created_at', { ascending: false })
          .then(({ data }) => setRooms(data || []));
      }, []);

      /* チャット表示時：既存メッセージ読み込み ＋ リアルタイム購読 */
      useEffect(() => {
        if (view !== 'chat' || !activeRoom) return;
        setMessages([]);
        sb.from('messages').select('*').eq('room_id', activeRoom.id)
          .order('created_at', { ascending: true }).limit(100)
          .then(({ data }) => setMessages(data || []));
        const channel = sb.channel(`room:${activeRoom.id}`)
          .on('postgres_changes', {
            event: 'INSERT', schema: 'public', table: 'messages',
            filter: `room_id=eq.${activeRoom.id}`,
          }, payload => setMessages(prev => [...prev, payload.new]))
          .subscribe();
        return () => { sb.removeChannel(channel); };
      }, [view, activeRoom?.id]);

      /* チャット最下部へスクロール */
      useEffect(() => {
        if (view === 'chat' && messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [messages, view]);

      /* メッセージ送信 */
      async function handleSendMsg() {
        const text = newMsg.trim();
        if (!text || !activeRoom || sending) return;
        const violation = checkContent(text);
        if (violation) { setFilterErr(violation); return; }
        if (!session) { setFilterErr('login_required'); return; }
        setSending(true);
        const { data: prof } = await sb.from('profiles').select('handle').eq('id', session.user.id).single();
        const handle = prof?.handle || session.user.user_metadata?.handle || '砂流れ';
        await sb.from('messages').insert({ room_id: activeRoom.id, user_id: session.user.id, handle, body: text });
        setSending(false);
        setNewMsg('');
      }

      /* ルーム削除 */
      async function handleDeleteRoom(roomId) {
        // メッセージを先に削除してからルームを削除
        await sb.from('messages').delete().eq('room_id', roomId);
        const { error } = await sb.from('rooms').delete().eq('id', roomId).eq('created_by', session.user.id);
        if (!error) {
          setRooms(prev => prev.filter(r => r.id !== roomId));
          setDeletingRoom(null);
        }
      }

      /* ルーム作成 */
      async function handleCreateRoom() {
        if (!newName.trim() || !session || creating) return;
        const violation = checkContent(newName);
        if (violation) { setFilterErr(violation); return; }
        setCreating(true);
        const { data, error } = await sb.from('rooms')
          .insert({ created_by: session.user.id, name: newName.trim() }).select().single();
        setCreating(false);
        if (!error && data) {
          setRooms(prev => [data, ...(prev || [])]);
          setNewName('');
          setView('list');
        }
      }

      /* ─ チャット画面 ─ */
      if (view === 'chat' && activeRoom) {
        return (
          <div className="chat-shell">
            {filterErr && <FilterToast type={filterErr} onClose={() => setFilterErr(null)} />}
            <div className="chat-header">
              <button className="chat-back" onClick={() => { setView('list'); setMessages([]); }}>←</button>
              <div className="chat-room-info">
                <div className="chat-room-name">{activeRoom.name}</div>
                <div className="chat-room-meta">焚き火を囲んでいる</div>
              </div>
            </div>
            <div className="chat-messages">
              {messages.length === 0 && (
                <p style={{ textAlign:'center', color:'#6A5A44', fontSize:'12px', marginTop:'24px', letterSpacing:'.08em', fontFamily:"'Noto Serif JP',serif" }}>
                  まだ誰もいない。<br />最初の言葉を灯してみよう。
                </p>
              )}
              {messages.map(m => {
                const isMe = session && m.user_id === session.user.id;
                return (
                  <div key={m.id} className={`chat-msg${isMe ? ' me' : ' other'}`}>
                    {!isMe && <div className="chat-msg-handle">{m.handle}</div>}
                    <div className="chat-msg-bubble">{m.body || m.text}</div>
                    <div className="chat-msg-time">{timeAgo(m.created_at)}</div>
                  </div>
                );
              })}
              <div ref={messagesEndRef} />
            </div>
            <div className="chat-input-area">
              <textarea
                className="chat-textarea"
                placeholder={session ? '焚き火に言葉を灯す…' : 'ログインすると発言できます'}
                rows={1}
                value={newMsg}
                onChange={e => setNewMsg(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMsg(); } }}
                disabled={!session}
              />
              <button className="chat-send-btn" onClick={handleSendMsg} disabled={!newMsg.trim() || sending || !session}>↑</button>
            </div>
          </div>
        );
      }

      /* ─ コミュニティ作成画面 ─ */
      if (view === 'create') {
        return (
          <div className="create-shell">
            {filterErr && <FilterToast type={filterErr} onClose={() => setFilterErr(null)} />}
            <div className="create-header">
              <button className="chat-back" onClick={() => setView('list')}>←</button>
              <span className="create-title-text">新しい焚き火を作る</span>
            </div>
            <div className="create-body">
              <p className="create-label">焚き火の名前</p>
              <input
                className="create-input" type="text"
                placeholder="例：深夜に絵を描く人たち"
                value={newName} onChange={e => setNewName(e.target.value)} maxLength={30}
              />
              <button className="create-submit-btn" onClick={handleCreateRoom} disabled={!newName.trim() || creating}>
                {creating ? '作成中…' : '焚き火を囲む'}
              </button>
            </div>
          </div>
        );
      }

      /* ─ ルーム一覧 ─ */
      const roomList = rooms || [];
      return (
        <div className="screen bonfire-screen">
          <div className="bonfire-header">
            <div className="screen-title">焚き火</div>
            <div className="screen-sub">共通の趣味だけで集まる場所</div>
          </div>
          {rooms === null && (
            <p style={{ textAlign:'center', padding:'30px 20px', color:'#6A5A44', fontSize:'12px', letterSpacing:'.08em', fontFamily:"'Noto Serif JP',serif" }}>読み込み中…</p>
          )}
          {roomList.map((room, i) => (
            <div key={room.id}>
              <div className="room-card">
                <div className="room-head" style={{ cursor:'pointer' }} onClick={() => { setActiveRoom(room); setView('chat'); setDeletingRoom(null); }}>
                  <div>
                    <div className="room-name">{room.name}</div>
                    <div className="room-meta">焚き火を囲む</div>
                  </div>
                  <span style={{ marginLeft:'auto', fontSize:'13px', color:'#6A5A44', flexShrink:0 }}>›</span>
                </div>
                {session && room.created_by === session.user.id && (
                  <div style={{ padding:'8px 16px 10px', borderTop:'1px solid rgba(232,110,30,.08)', display:'flex', justifyContent:'flex-end' }}>
                    {deletingRoom === room.id ? (
                      <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
                        <span style={{ fontSize:'11px', color:'#C86018', letterSpacing:'.06em' }}>削除しますか？</span>
                        <button onClick={() => setDeletingRoom(null)}
                          style={{ background:'none', border:'none', cursor:'pointer', fontSize:'11px', color:'#6A5A44', fontFamily:"'Noto Serif JP',serif" }}>いいえ</button>
                        <button onClick={() => handleDeleteRoom(room.id)}
                          style={{ background:'#C86018', border:'none', cursor:'pointer', fontSize:'11px', color:'#FFF8F0', padding:'3px 12px', borderRadius:'8px', fontFamily:"'Noto Serif JP',serif", letterSpacing:'.08em' }}>削除</button>
                      </div>
                    ) : (
                      <button onClick={() => setDeletingRoom(room.id)}
                        style={{ background:'none', border:'none', cursor:'pointer', fontSize:'10px', color:'#6A5A44', letterSpacing:'.1em', fontFamily:"'Noto Serif JP',serif" }}>
                        この焚き火を消す
                      </button>
                    )}
                  </div>
                )}
              </div>
              {i === 0 && <AdCard data={AD_BONFIRE} />}
            </div>
          ))}
          {rooms !== null && roomList.length === 0 && (
            <p style={{ textAlign:'center', padding:'30px 20px', color:'#6A5A44', fontSize:'13px', lineHeight:2.2, letterSpacing:'.08em', fontFamily:"'Noto Serif JP',serif" }}>
              まだ焚き火がない。<br />最初に灯してみよう。
            </p>
          )}
          {session && (
            <button className="room-create-card" onClick={() => setView('create')}>
              <span style={{ fontSize:'18px' }}>＋</span>
              <span>新しい焚き火を作る</span>
            </button>
          )}
          <div style={{ height:'24px' }} />
        </div>
      );
    }

    /* ── Write ── */
    /* ── FilterToast ── */
    function FilterToast({ type, onClose }) {
      useEffect(() => {
        const t = setTimeout(onClose, 3800);
        return () => clearTimeout(t);
      }, []);
      const MSG = {
        hate:          { title: 'ヘイトコンテンツは投稿できません',   sub: 'さら砂は誰もが安心できる場所を目指しています。' },
        adult:         { title: 'アダルトコンテンツは投稿できません', sub: 'このサービスはアダルトコンテンツを許可していません。' },
        personal:      { title: '個人情報は投稿できません',           sub: '電話番号・メールアドレス・住所などの投稿はお断りしています。' },
        login_required:{ title: 'ログインが必要です',                 sub: '発言するにはログインしてください。' },
      };
      const m = MSG[type] || MSG.hate;
      return (
        <div className="filter-toast">
          <span className="filter-toast-icon" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'14px', fontWeight:500, color:'#C84040' }}>禁</span>
          <div className="filter-toast-body">
            <p className="filter-toast-title">{m.title}</p>
            <p className="filter-toast-msg">{m.sub}</p>
          </div>
        </div>
      );
    }

    function Write({ session, onSent }) {
      const [mode, setMode]           = useState('short');
      const [shortText, setShort]     = useState(() => localStorage.getItem(SAVE_SHORT) || '');
      const [novelTitle, setTitle]    = useState(() => localStorage.getItem(SAVE_TITLE) || '');
      const [novelText, setNovel]     = useState(() => localStorage.getItem(SAVE_NOVEL) || '');
      const [savedMsg, setSaved]      = useState(false);
      const [sent, setSent]           = useState(null);
      const [filterErr, setFilterErr] = useState(null);
      const [sending, setSending]     = useState(false);
      const timer = useRef(null);

      function autosave(key, val) {
        clearTimeout(timer.current);
        timer.current = setTimeout(() => {
          localStorage.setItem(key, val);
          setSaved(true);
          setTimeout(() => setSaved(false), 1600);
        }, 700);
      }

      const today = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
      const canSend = session && (mode === 'short' ? shortText.trim().length > 0 : novelText.trim().length > 0 && novelTitle.trim().length > 0);

      async function handleSend(dest) {
        if (!canSend || sending) return;
        const target = mode === 'short' ? shortText : novelTitle + ' ' + novelText;
        const violation = checkContent(target);
        if (violation) { setFilterErr(violation); return; }
        setSending(true);
        const { data: prof } = await sb.from('profiles').select('handle').eq('id', session.user.id).single();
        const handle = prof?.handle || session.user.user_metadata?.handle || '砂流れ';
        const body = mode === 'novel' && novelTitle
          ? `【${novelTitle}】\n${novelText}`
          : (mode === 'short' ? shortText : novelText);
        const { error: insertErr } = await sb.from('posts').insert({
          user_id: session.user.id,
          handle,
          dest: dest === '海' ? 'ocean' : 'bonfire',
          body,
        });
        if (insertErr) { console.error('insert error:', insertErr); setSending(false); return; }
        // 送信直後に下書きをクリア（リロード対策）
        if (mode === 'short') { setShort(''); localStorage.removeItem(SAVE_SHORT); }
        else { setNovel(''); setTitle(''); localStorage.removeItem(SAVE_NOVEL); localStorage.removeItem(SAVE_TITLE); }
        setSending(false);
        setSent(dest);
        setTimeout(() => { setSent(null); onSent(dest); }, 2600);
      }

      if (sent) {
        return (
          <div className="write-shell">
            <div className="sent-view">
              <div className="sent-icon" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'52px', fontWeight:300, color: sent==='海' ? 'var(--ocean)' : '#E87828' }}>
                {sent === '海' ? '海' : '火'}
              </div>
              <p className="sent-title">{sent === '海' ? '瓶を海に流しました。\nどこかの浜辺に届くかもしれない。' : '焚き火に流しました。\n仲間に届きますように。'}</p>
              <p className="sent-note">さらさらと、手放せた。</p>
              <AdBanner data={AD_SENT} />
            </div>
          </div>
        );
      }

      return (
        <div className="write-shell">
          {filterErr && <FilterToast type={filterErr} onClose={() => setFilterErr(null)} />}
          {/* ヘッダー（固定） */}
          <div className="write-header">
            <div className="write-header-top">
              <div className="screen-title">書く</div>
              <div className="screen-sub">{today}</div>
            </div>
            <div className="write-mode-tabs">
              <button className={`write-mode-tab${mode==='short'?' active':''}`} onClick={() => setMode('short')}>ショート日記</button>
              <button className={`write-mode-tab${mode==='novel'?' active':''}`} onClick={() => setMode('novel')}>日記小説</button>
            </div>
          </div>

          {/* スクロール領域 */}
          <div className="write-body">
            {mode === 'short' && (
              <div className="write-paper">
                <textarea
                  className="write-area"
                  placeholder="さらさらと、流してみる。"
                  value={shortText}
                  onChange={e => { setShort(e.target.value); autosave(SAVE_SHORT, e.target.value); }}
                  maxLength={300}
                />
                <div className="write-count">{shortText.length} / 300</div>
              </div>
            )}

            {mode === 'novel' && (
              <div className="manuscript-paper">
                <input
                  className="manuscript-title"
                  placeholder="タイトル"
                  value={novelTitle}
                  onChange={e => { setTitle(e.target.value); autosave(SAVE_TITLE, e.target.value); }}
                  maxLength={60}
                />
                <textarea
                  className="novel-area"
                  placeholder={"自分の経験や思考を、\n物語のように綴る。"}
                  value={novelText}
                  onChange={e => { setNovel(e.target.value); autosave(SAVE_NOVEL, e.target.value); }}
                  maxLength={5000}
                />
                <div className="novel-count">
                  <span className={`autosave-indicator${savedMsg ? ' on' : ''}`}>✓ 自動保存済み</span>
                  <span>{novelText.length} / 5000</span>
                </div>
              </div>
            )}
          </div>

          {/* 送信（固定） */}
          <div className="send-area">
            <p className="send-label">どこへ流しますか</p>
            <div className="send-btns">
              <button className="send-btn fire"  onClick={() => handleSend('焚き火')} disabled={!canSend || sending}>
                <span className="send-btn-icon" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'18px', fontWeight:400 }}>火</span>
                焚き火に流す
              </button>
              <button className="send-btn ocean" onClick={() => handleSend('海')}    disabled={!canSend || sending}>
                <span className="send-btn-icon" style={{ fontFamily:"'Shippori Mincho',serif", fontSize:'18px', fontWeight:400 }}>海</span>
                海に流す
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Naminoto ── */
    function Naminoto() {
      return (
        <div className="screen naminoto-screen">
          <div className="naminoto-header">
            <div className="screen-title">波音</div>
            <div className="screen-sub">浜辺に届いた気配</div>
          </div>
          <div className="wave-count-card">
            <div className="wave-big">0</div>
            <p className="wave-label">今日の波音</p>
            <p className="wave-detail">まだ波音は届いていない</p>
            <div><span className="wave-expire">48時間後に消えていく</span></div>
          </div>
          <div style={{ textAlign:'center', padding:'40px 28px', color:'var(--ink-3)', fontFamily:"'Noto Serif JP',serif" }}>
            <p style={{ fontSize:'13px', lineHeight:2.4, letterSpacing:'.08em' }}>
              砂浜は静かです。<br />誰かの気配を待っています。
            </p>
          </div>
          <AdBanner data={AD_NAMINOTO} />
          <p className="naminoto-note">波音は48時間で消えていく。<br />執着せず、さらさらと。</p>
        </div>
      );
    }

    /* ── Register ── */
    function Register({ onRegistered, onLogin }) {
      const [email,     setEmail]    = useState('');
      const [password,  setPassword] = useState('');
      const [showPw,    setShowPw]   = useState(false);
      const [birthYear, setBirth]    = useState('');
      const [handle,    setHandle]   = useState('');
      const [agreed,    setAgreed]   = useState(false);
      const [errors,    setErrors]   = useState({});
      const [loading,   setLoading]  = useState(false);

      const maxYear = new Date().getFullYear() - 13;
      const years = [];
      for (let y = maxYear; y >= 1924; y--) years.push(y);

      function validate() {
        const e = {};
        if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = 'メールアドレスの形式が正しくありません';
        if (password.length < 8) e.password = '8文字以上で設定してください';
        if (!birthYear) e.birth = '生まれた年を選んでください';
        if (!handle.trim()) e.handle = 'ハンドルネームを入力してください';
        if (!agreed) e.agreed = '利用規約への同意が必要です';
        return e;
      }

      async function handleSubmit() {
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        setLoading(true);
        const { error } = await sb.auth.signUp({
          email,
          password,
          options: {
            data: { handle: handle.trim(), birth_year: parseInt(birthYear) },
          },
        });
        setLoading(false);
        if (error) {
          const msg = error.message.includes('already') ? 'このメールアドレスはすでに登録されています' : error.message;
          setErrors({ email: msg });
          return;
        }
        onRegistered();
      }

      const canSubmit = email && password.length >= 8 && birthYear && handle.trim() && agreed && !loading;

      return (
        <div className="register-shell">
          <div className="register-scroll">
            <div className="register-logo-area">
              <span className="splash-logo" style={{ fontSize:'20px', letterSpacing:'.48em' }}>SARASUNA</span>
              <div className="register-divider-line"><div className="register-divider-dot" /></div>
              <p className="register-subtitle">比べない場所で、書いてみよう。<br />登録は無料・1分でできます</p>
            </div>

            <div className="form-field">
              <label className="form-label">メールアドレス</label>
              <input className="form-input" type="email" placeholder="example@mail.com"
                value={email} onChange={e => { setEmail(e.target.value); setErrors(p => ({...p, email:null})); }} />
              {errors.email && <p className="form-error">{errors.email}</p>}
            </div>

            <div className="form-field">
              <label className="form-label">パスワード</label>
              <div className="pw-wrap">
                <input className="form-input" type={showPw ? 'text' : 'password'} placeholder="8文字以上"
                  value={password} onChange={e => { setPassword(e.target.value); setErrors(p => ({...p, password:null})); }} />
                <button className="pw-toggle" type="button" onClick={() => setShowPw(v => !v)}>
                  {showPw ? '隠す' : '表示'}
                </button>
              </div>
              {errors.password && <p className="form-error">{errors.password}</p>}
            </div>

            <div className="form-field">
              <label className="form-label">生まれた年</label>
              <select className="form-select" value={birthYear}
                onChange={e => { setBirth(e.target.value); setErrors(p => ({...p, birth:null})); }}>
                <option value="">選択してください</option>
                {years.map(y => <option key={y} value={y}>{y}年</option>)}
              </select>
              <p className="form-hint">13歳未満の方はご利用いただけません</p>
              {errors.birth && <p className="form-error">{errors.birth}</p>}
            </div>

            <div className="form-field">
              <label className="form-label">ハンドルネーム</label>
              <input className="form-input" type="text" placeholder="砂時計、夜の波… (20文字以内)"
                value={handle} maxLength={20}
                onChange={e => { setHandle(e.target.value); setErrors(p => ({...p, handle:null})); }} />
              <p className="form-hint">アプリ内での表示名です。本名は不要です。</p>
              {errors.handle && <p className="form-error">{errors.handle}</p>}
            </div>

            <div className="form-check">
              <input type="checkbox" id="tos" checked={agreed}
                onChange={e => { setAgreed(e.target.checked); setErrors(p => ({...p, agreed:null})); }} />
              <label className="form-check-label" htmlFor="tos">
                <button className="form-check-link" type="button">利用規約</button>および
                <button className="form-check-link" type="button">プライバシーポリシー</button>に同意します
              </label>
            </div>
            {errors.agreed && <p className="form-error" style={{ marginTop:'-12px', marginBottom:'16px' }}>{errors.agreed}</p>}

            <button className="register-btn" onClick={handleSubmit} disabled={!canSubmit}>
              {loading ? '登録中…' : '無料ではじめる'}
            </button>

            <div className="register-login-wrap">
              すでにアカウントをお持ちの方は&nbsp;
              <button className="register-login-btn" onClick={onLogin}>ログイン</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Login ── */

      const [showPw,   setShowPw]   = useState(false);

      async function handleLogin() {
        if (!email || !password) { setError('メールアドレスとパスワードを入力してください'); return; }
        setLoading(true);
        const { error: err } = await sb.auth.signInWithPassword({ email, password });
        setLoading(false);
        if (err) {
          setError('メールアドレスまたはパスワードが正しくありません');
          return;
        }
        onLoggedIn(); // onAuthStateChange が session をセットするため no-op でOK
      }

      return (
        <div className="register-shell">
          <div className="register-scroll">
            <div className="register-logo-area">
              <span className="splash-logo" style={{ fontSize:'20px', letterSpacing:'.48em' }}>SARASUNA</span>
              <div className="register-divider-line"><div className="register-divider-dot" /></div>
              <p className="register-subtitle">おかえりなさい</p>
            </div>

            <div className="form-field">
              <label className="form-label">メールアドレス</label>
              <input className="form-input" type="email" placeholder="example@mail.com"
                value={email} onChange={e => { setEmail(e.target.value); setError(''); }} />
            </div>

            <div className="form-field">
              <label className="form-label">パスワード</label>
              <div className="pw-wrap">
                <input className="form-input" type={showPw ? 'text' : 'password'} placeholder="パスワード"
